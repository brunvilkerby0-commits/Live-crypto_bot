<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Live Crypto Bot - Recharge Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }

        .header { padding: 20px; display: flex; align-items: center; background: var(--card-dark); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .header a { color: var(--gold); text-decoration: none; margin-right: 20px; font-size: 20px; }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* SELEKSYON SÈVIS */
        .service-selection { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .service-item { 
            background: var(--card-dark); border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .service-item.active { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        .meru-logo { background: white; color: black; font-weight: 900; padding: 5px; border-radius: 5px; font-size: 12px; display: inline-block; margin-bottom: 10px; }

        /* FORMILÈ */
        .form-box { background: var(--card-dark); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        label { font-size: 11px; color: var(--gold); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 8px; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 15px; background: #0a192f; border: 1px solid rgba(212, 175, 55, 0.2); 
            color: white; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; 
        }

        .btn-gold { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; text-transform: uppercase; }
        
        .payment-icons { display: flex; justify-content: center; gap: 15px; margin-top: 20px; opacity: 0.6; font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html"><i class="fas fa-arrow-left"></i></a>
        <div style="font-weight: 800; letter-spacing: 1px;">RECHARGER UN SERVICE</div>
    </div>

    <div class="container">
        <p style="font-size: 14px; opacity: 0.8; margin-bottom: 20px;">Choisissez le service à recharger :</p>
        
        <div class="service-selection">
            <div class="service-item active" onclick="setService('Meru Master Card', this)">
                <div class="meru-logo">MERU</div>
                <div style="font-size: 11px; font-weight: bold;">MASTER CARD</div>
            </div>
            <div class="service-item" onclick="setService('Wise / PayPal', this)">
                <i class="fas fa-wallet" style="font-size: 24px; color: var(--gold); margin-bottom: 10px;"></i>
                <div style="font-size: 11px; font-weight: bold;">AUTRES</div>
            </div>
        </div>

        <div class="form-box">
            <div id="selectedTitle" style="text-align: center; color: var(--gold); font-weight: bold; margin-bottom: 25px; font-size: 18px;">RECHARGE : MERU MASTER CARD</div>

            <label>Adresse ou Email du compte</label>
            <input type="text" id="accountAddress" placeholder="Ex: votre@email.com oswa ID">

            <label>Montant à recharger ($)</label>
            <input type="number" id="rechargeAmount" placeholder="0.00">

            <label>PIN de sécurité du site</label>
            <input type="password" id="rechargePin" maxlength="4" placeholder="****">

            <button class="btn-gold" onclick="processRecharge()">Valider la Recharge</button>

            <div class="payment-icons">
                <i class="fab fa-cc-visa"></i>
                <i class="fab fa-cc-mastercard"></i>
                <i class="fab fa-paypal"></i>
                <i class="fas fa-university"></i>
            </div>
        </div>
    </div>

    <script>
        let currentService = "Meru Master Card";

        function setService(name, el) {
            currentService = name;
            document.querySelectorAll('.service-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('selectedTitle').innerText = "RECHARGE : " + name.toUpperCase();
        }

        function processRecharge() {
            const addr = document.getElementById('accountAddress').value;
            const amt = document.getElementById('rechargeAmount').value;
            const pin = document.getElementById('rechargePin').value;

            if(!addr || !amt || !pin) {
                alert("Veuillez remplir tous les champs !");
                return;
            }

            alert("Demande de recharge pour " + currentService + " reçue.\nMontant: $" + amt + "\nStatut: Traitement en cours.");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
