<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramètres - Live Crypto Bot</title>
    <style>
        /* Bloke scroll ak zoom pou l rete rèd */
        html, body { 
            height: 100%; margin: 0; overflow: hidden; 
            background-color: #0b1426; color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .container { 
            background-color: #111d35; width: 92%; max-width: 400px; 
            border-radius: 25px; padding: 25px; border: 1px solid #1a263d; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: #f3ba2f; margin: 0; text-transform: uppercase; font-size: 1.4em; }
        
        /* Profil Section */
        .profile-info { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 15px; border-radius: 15px; 
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 25px; border: 1px solid #1a263d;
        }
        .avatar { 
            width: 50px; height: 50px; background: #f3ba2f; 
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; font-weight: bold; color: #0b1426; font-size: 1.2em;
        }

        /* Menu list */
        .settings-list { display: flex; flex-direction: column; gap: 12px; }
        
        .setting-item {
            background: #1a263d; padding: 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.3s; border: 1px solid transparent;
        }
        .setting-item:hover { border-color: #f3ba2f; background: #1e2d4a; }
        
        .setting-label { display: flex; align-items: center; gap: 12px; font-size: 0.95em; }
        .icon { color: #f3ba2f; font-size: 1.2em; }
        .arrow { color: #555; font-size: 0.8em; }

        /* Logout button */
        .btn-logout {
            margin-top: 30px; width: 100%; background: rgba(229, 9, 20, 0.1);
            color: #e50914; border: 1px solid #e50914; padding: 14px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-logout:hover { background: #e50914; color: white; }

        .footer-text { text-align: center; color: #555; font-size: 0.75em; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Paramètres</h2>
    </div>

    <div class="profile-info">
        <div class="avatar">B</div>
        <div>
            <div style="font-weight: bold; font-size: 1em;">Brunvil Kerby</div>
            <div style="font-size: 0.8em; color: #888;">ID: 93964746</div>
        </div>
    </div>

    <div class="settings-list">
        <div class="setting-item" onclick="alert('Modifier Profil')">
            <div class="setting-label"><span class="icon">👤</span> Mon Profil</div>
            <span class="arrow">▶</span>
        </div>

        <div class="setting-item" onclick="alert('Sécurité')">
            <div class="setting-label"><span class="icon">🔒</span> Sécurité & Mot de passe</div>
            <span class="arrow">▶</span>
        </div>

        <div class="setting-item" onclick="alert('Langue')">
            <div class="setting-label"><span class="icon">🌐</span> Langue (Français)</div>
            <span class="arrow">▶</span>
        </div>

        <div class="setting-item" onclick="window.location.href='mailto:support@livecryptobot.com'">
            <div class="setting-label"><span class="icon">🎧</span> Support Client</div>
            <span class="arrow">▶</span>
        </div>
    </div>

    <button class="btn-logout" onclick="confirm('Voulez-vous vous déconnecter ?')">Déconnexion</button>

    <div class="footer-text">Version 2.0.1 • Live Crypto Bot</div>
</div>

</body>
</html>
