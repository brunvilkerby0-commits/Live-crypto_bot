<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharger - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #0a192f; --card: #112240; --gold: #d4af37; --blue: #0063e5; --text: #ccd6f6; }
        body { background: var(--navy); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; margin-top: 10px; }
        h2 { color: var(--gold); text-align: center; text-transform: uppercase; margin-bottom: 20px; }

        .methods { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .method-card { 
            background: var(--card); padding: 15px 5px; border-radius: 12px; text-align: center; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .method-card i { display: block; font-size: 24px; margin-bottom: 8px; color: var(--gold); }
        .method-card.active { border-color: var(--blue); background: rgba(0, 99, 229, 0.1); }

        .recharge-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 8px; }
        .field { position: relative; }
        .field i { position: absolute; left: 15px; top: 13px; color: var(--blue); }
        .field input { 
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 12px 12px 45px; border-radius: 10px; color: white; outline: none; box-sizing: border-box;
        }

        .summary { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .sum-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; }
        .total-row { border-top: 1px solid rgba(255,255,255,0.1); font-weight: bold; color: #2ecc71; font-size: 18px; margin-top: 10px; padding-top: 10px;}

        .btn-pay { 
            width: 100%; padding: 15px; background: var(--blue); color: white; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        #status { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 25px; border-radius: 10px; display: none; z-index: 9999;
            font-weight: bold; text-align: center; min-width: 250px;
        }
    </style>
</head>
<body>

<div id="status"></div>

<div class="container">
    <h2>RECHARGER</h2>

    <div class="methods">
        <div class="method-card active" onclick="setMethod('paypal', 4)">
            <i class="fab fa-paypal"></i><span>PayPal</span>
        </div>
        <div class="method-card" onclick="setMethod('visa', 2.10)">
            <i class="fab fa-cc-visa"></i><span>Visa/Card</span>
        </div>
        <div class="method-card" onclick="setMethod('wise', 3)">
            <i class="fas fa-university"></i><span>Wise</span>
        </div>
    </div>

    <div class="recharge-card">
        <div class="input-group">
            <label id="label-id">Email du compte PayPal</label>
            <div class="field">
                <i class="fas fa-user"></i>
                <input type="text" id="user-info" placeholder="Entrez votre identifiant">
            </div>
        </div>

        <div class="input-group">
            <label>Montant total à payer ($)</label>
            <div class="field">
                <i class="fas fa-dollar-sign"></i>
                <input type="number" id="amount" placeholder="Entrez le montant total" oninput="calculer()">
            </div>
        </div>

        <div class="summary">
            <div class="sum-row"><span>Méthode:</span> <span id="view-method">PAYPAL</span></div>
            <div class="sum-row"><span>Frais de service (Déduit):</span> <span id="view-frais">$4.00</span></div>
            <div class="total-row"><span>Montant à recevoir:</span> <span id="view-total">$0.00</span></div>
        </div>

        <button class="btn-pay" onclick="finaliser()">Confirmer la recharge</button>
    </div>

    <p style="text-align: center; margin-top: 25px;">
        <a href="index.html" style="color: var(--text); text-decoration: none; font-size: 14px;">
            <i class="fas fa-arrow-left"></i> Retour au Dashboard
        </a>
    </p>
</div>

<script>
    let currentFrais = 4.00;
    let currentMethod = 'paypal';

    function setMethod(name, frais) {
        currentMethod = name;
        currentFrais = Number(frais);
        
        document.querySelectorAll('.method-card').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        document.getElementById('label-id').innerText = (name === 'visa') ? "Nom sur la carte / Email" : "Email du compte " + name;
        document.getElementById('view-method').innerText = name.toUpperCase();
        document.getElementById('view-frais').innerText = "$" + currentFrais.toFixed(2);
        
        calculer();
    }

    function calculer() {
        let val = document.getElementById('amount').value;
        let viewTotal = document.getElementById('view-total');

        if (val === "" || parseFloat(val) <= 0) {
            viewTotal.innerText = "$0.00";
            return;
        }

        let totalPeye = Number(val);
        
        // Isit la nou retire frè a nan sa l peye a
        let aResevwa = totalPeye - currentFrais;

        // Si lajan an pa sifi pou kouvri frè a, nou mete 0
        if (aResevwa < 0) aResevwa = 0;

        viewTotal.innerText = "$" + aResevwa.toFixed(2);
    }

    function finaliser() {
        const info = document.getElementById('user-info').value;
        const amt = document.getElementById('amount').value;
        const aResevwa = Number(amt) - currentFrais;

        if(!info || !amt || Number(amt) <= 0) {
            showMsg("Remplissez les champs ⚠️", "white", "rgba(255, 77, 77, 0.9)");
            return;
        }

        if(aResevwa <= 0) {
            showMsg("Montant insuffisant pour couvrir les frais ❌", "white", "rgba(255, 77, 77, 0.9)");
            return;
        }

        showMsg("Demande envoyée avec succès! ✅", "white", "rgba(0, 99, 229, 0.9)");
        
        setTimeout(() => {
            document.getElementById('user-info').value = "";
            document.getElementById('amount').value = "";
            calculer();
        }, 1000);
    }

    function showMsg(txt, color, bg) {
        const status = document.getElementById('status');
        status.innerText = txt;
        status.style.color = color;
        status.style.background = bg;
        status.style.display = "block";
        setTimeout(() => { status.style.display = "none"; }, 2000);
    }
</script>

</body>
</html>
