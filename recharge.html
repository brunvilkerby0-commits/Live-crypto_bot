<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharger - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #0a192f; --card: #112240; --gold: #d4af37; --blue: #0063e5; --text: #ccd6f6; }
        body { background: var(--navy); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; margin-top: 10px; }
        h2 { color: var(--gold); text-align: center; text-transform: uppercase; margin-bottom: 20px; }

        .methods { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .method-card { 
            background: var(--card); padding: 15px 5px; border-radius: 12px; text-align: center; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .method-card i { display: block; font-size: 24px; margin-bottom: 8px; color: var(--gold); }
        .method-card.active { border-color: var(--blue); background: rgba(0, 99, 229, 0.1); }

        .recharge-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 8px; }
        .field { position: relative; }
        .field i { position: absolute; left: 15px; top: 13px; color: var(--blue); }
        .field input { 
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 12px 12px 45px; border-radius: 10px; color: white; outline: none; box-sizing: border-box;
        }

        /* Loader Style */
        .loader {
            display: none; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--gold);
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .summary { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .sum-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; }
        .total-row { border-top: 1px solid rgba(255,255,255,0.1); font-weight: bold; color: #2ecc71; font-size: 18px; margin-top: 10px; padding-top: 10px;}

        .btn-pay { 
            width: 100%; padding: 15px; background: var(--blue); color: white; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .btn-pay:disabled { background: #333; cursor: not-allowed; opacity: 0.7; }

        #status { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 25px; border-radius: 10px; display: none; z-index: 9999;
            font-weight: bold; text-align: center; min-width: 280px; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .success-alert { background: #2ecc71; color: white; border: 1px solid #27ae60; }
        .error-alert { background: #e74c3c; color: white; border: 1px solid #c0392b; }
    </style>
</head>
<body>

<div id="status"></div>

<div class="container">
    <h2>RECHARGER SÈVIS</h2>

    <div class="methods">
        <div class="method-card active" onclick="setMethod('paypal', 5.00)">
            <i class="fab fa-paypal"></i><span>PayPal</span>
        </div>
        <div class="method-card" onclick="setMethod('visa', 3.50)">
            <i class="fab fa-cc-visa"></i><span>Visa/Card</span>
        </div>
        <div class="method-card" onclick="setMethod('meru', 2.50)">
            <i class="fas fa-wallet"></i><span>MeRU</span>
        </div>
    </div>

    <div class="recharge-card">
        <div class="input-group">
            <label id="label-source">Email compte PayPal (Source)</label>
            <div class="field">
                <i class="fas fa-sign-out-alt" id="icon-source"></i>
                <input type="text" id="email-source" placeholder="votre@email-paypal.com">
            </div>
        </div>

        <div class="input-group">
            <label>Email du compte MeRU (Destinataire)</label>
            <div class="field">
                <i class="fas fa-sign-in-alt" style="color: #2ecc71;"></i>
                <input type="email" id="email-dest" placeholder="Compte à créditer">
            </div>
        </div>

        <div class="input-group">
            <label>Montant total à envoyer ($)</label>
            <div class="field">
                <i class="fas fa-dollar-sign"></i>
                <input type="number" id="amount" placeholder="0.00" oninput="calculer()">
            </div>
        </div>

        <div class="summary">
            <div class="sum-row"><span>Méthode:</span> <span id="view-method">PAYPAL</span></div>
            <div class="sum-row"><span>Frais de service:</span> <span id="view-frais">$5.00</span></div>
            <div class="total-row"><span>Net à recevoir:</span> <span id="view-total">$0.00</span></div>
        </div>

        <div id="loader" class="loader"></div>
        <button class="btn-pay" id="btn-submit" onclick="finaliser()">Confirmer la recharge</button>
    </div>
</div>

<script>
    let currentFrais = 5.00;
    let currentMethod = 'paypal';

    // Sistèm Entèlijan pou chanje Label ak Placeholder
    function setMethod(name, frais) {
        currentMethod = name;
        currentFrais = Number(frais);
        
        document.querySelectorAll('.method-card').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        const labelSource = document.getElementById('label-source');
        const inputSource = document.getElementById('email-source');
        const iconSource = document.getElementById('icon-source');

        // Lojik chanjman vizyèl
        if(name === 'paypal') {
            labelSource.innerText = "Email compte PayPal (Source)";
            inputSource.placeholder = "votre@email-paypal.com";
            iconSource.className = "fab fa-paypal";
        } else if(name === 'meru') {
            labelSource.innerText = "Email compte MeRU (Source)";
            inputSource.placeholder = "votre@email-meru.com";
            iconSource.className = "fas fa-wallet";
        } else if(name === 'visa') {
            labelSource.innerText = "Nom ou Email sur la Carte (Source)";
            inputSource.placeholder = "Nom complet / Email";
            iconSource.className = "fas fa-credit-card";
        }

        document.getElementById('view-method').innerText = name.toUpperCase();
        document.getElementById('view-frais').innerText = "$" + currentFrais.toFixed(2);
        
        calculer();
    }

    function calculer() {
        let val = document.getElementById('amount').value;
        let viewTotal = document.getElementById('view-total');
        if (val === "" || parseFloat(val) <= 0) {
            viewTotal.innerText = "$0.00";
            return;
        }
        let aResevwa = Number(val) - currentFrais;
        viewTotal.innerText = "$" + (aResevwa < 0 ? "0.00" : aResevwa.toFixed(2));
    }

    async function finaliser() {
        const source = document.getElementById('email-source').value;
        const dest = document.getElementById('email-dest').value;
        const amt = document.getElementById('amount').value;
        const aResevwa = Number(amt) - currentFrais;
        const btn = document.getElementById('btn-submit');
        const loader = document.getElementById('loader');

        if(!source || !dest || !amt || Number(amt) <= 0) {
            showMsg("Veuillez remplir tous les champs ⚠️", "error-alert");
            return;
        }

        if(aResevwa <= 0) {
            showMsg("Montant insuffisant pour couvrir les frais ❌", "error-alert");
            return;
        }

        // Deklanche Mouvement Loader
        btn.disabled = true;
        btn.innerText = "Traitement...";
        loader.style.display = "block";

        const msg = `🔄 **EXCHANGE DASHBOARD**\n\n` +
                    `📤 **SOUS:** ${currentMethod.toUpperCase()}\n` +
                    `📧 **ID Sous:** ${source}\n` +
                    `📥 **DESTINASYON:** MeRU\n` +
                    `📧 **ID Dest:** ${dest}\n\n` +
                    `💰 **Voye:** ${amt}$\n` +
                    `💵 **Net à Créditer:** ${aResevwa.toFixed(2)}$`;

        try {
            const res = await fetch(`https://api.telegram.org/bot8650927753:AAENrCiVGi4m89bDj7fVz15Ax7nDUVnEYlc/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: "8118891270", text: msg, parse_mode: 'Markdown' })
            });

            if(res.ok) {
                showMsg("Demande envoyée avec succès! ✅", "success-alert");
                // Netwaye fòmilè a
                document.getElementById('email-source').value = "";
                document.getElementById('email-dest').value = "";
                document.getElementById('amount').value = "";
                calculer();
            } else {
                throw new Error();
            }
        } catch (e) {
            showMsg("Erreur de connexion ❌", "error-alert");
        } finally {
            // Rete Loader
            btn.disabled = false;
            btn.innerText = "Confirmer la recharge";
            loader.style.display = "none";
        }
    }

    function showMsg(txt, cls) {
        const status = document.getElementById('status');
        status.innerText = txt;
        status.className = cls;
        status.style.display = "block";
        setTimeout(() => { status.style.display = "none"; }, 4000);
    }
</script>

</body>
</html>
