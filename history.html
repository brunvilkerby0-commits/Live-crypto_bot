<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Istorik - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--navy); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0;
        }

        /* HEADER */
        .header { 
            background: var(--card-dark); padding: 20px; 
            display: flex; align-items: center; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .btn-back { color: var(--gold); text-decoration: none; font-size: 24px; margin-right: 20px; }
        .header h2 { margin: 0; font-size: 18px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        .container { margin-top: 85px; padding: 15px; }

        /* TRANSACTION CARD */
        .empty-state {
            text-align: center; margin-top: 100px; opacity: 0.5;
        }
        .empty-state i { font-size: 50px; color: var(--gold); margin-bottom: 15px; }

        .history-list { display: flex; flex-direction: column; gap: 12px; }
        
        .history-item {
            background: var(--card-dark); padding: 15px; border-radius: 15px;
            border-left: 4px solid var(--gold); display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .details { display: flex; flex-direction: column; }
        .type { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .date { font-size: 11px; opacity: 0.6; }
        
        .amount { text-align: right; }
        .val { font-weight: 800; color: #fff; font-size: 15px; }
        .status { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-top: 5px; display: inline-block; }
        
        .status.completed { background: rgba(0, 255, 0, 0.1); color: #00ff00; }
        .status.pending { background: rgba(212, 175, 55, 0.1); color: var(--gold); }
    </style>
</head>
<body>

<div class="header">
    <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
    <h2>Istorik Tranzaksyon</h2>
</div>

<div class="container">
    <div id="noData" class="empty-state">
        <i class="fas fa-receipt"></i>
        <p>Ou poko gen okenn tranzaksyon.</p>
    </div>

    <div id="historyList" class="history-list">
        </div>
</div>

<script>
    // Lè nou pral konekte bot la oswa baz de done a, 
    // n'ap ranpli seksyon sa a otomatikman.
    window.onload = function() {
        // Pou kounye a li vid jan ou mande l la
        const historyData = []; 
        
        if(historyData.length > 0) {
            document.getElementById('noData').style.display = 'none';
        }
    }
</script>

</body>
</html>
