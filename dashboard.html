<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablo - Live Crypto Bot</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .logo { font-weight: bold; font-size: 18px; color: #d4af37; }
        
        /* To Echanj Style Izichanj */
        .rate-bar { background: #1c2128; padding: 12px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #30363d; display: flex; align-items: center; gap: 10px; }
        .rate-icon { color: #d4af37; }

        /* Balans ak Kat */
        .balance-box { background: #1c2128; padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        .balance-title { color: #8b949e; font-size: 14px; }
        .balance-amount { font-size: 28px; color: #d4af37; margin: 5px 0; }

        /* Kat la */
        .visa-card { background: linear-gradient(135deg, #002b5b, #001a33); padding: 20px; border-radius: 15px; height: 160px; border: 1px solid #d4af37; position: relative; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        
        /* Bouton Aksyon */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .btn-action { background: #1c2128; border: 1px solid #30363d; color: white; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; }

        .btn-main { background: #d4af37; color: black; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Istwa Tranzaksyon */
        .history { background: #1c2128; border-radius: 15px; padding: 15px; border: 1px solid #30363d; }
        .history-item { border-bottom: 1px solid #30363d; padding: 12px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Live Crypto Bot</div>
        <div style="font-size: 20px;">🔔 ⚙️</div>
    </div>

    <div class="rate-bar">
        <span class="rate-icon">🔄</span>
        <span>To retrè: <b>1 USDT = 144.00 HTG</b></span>
    </div>

    <div class="balance-box">
        <div class="balance-title">Balans aktèl</div>
        <div class="balance-amount">0.00 HTG</div>
        <div style="color: #8b949e; font-size: 12px;">0.00 USDT</div>
    </div>

    <div class="action-grid">
        <div class="btn-action">📥 Depoze</div>
        <div class="btn-action">📤 Retire</div>
    </div>

    <h3>Ma Carte Visa</h3>
    <div class="visa-card">
        <div style="font-size: 18px; letter-spacing: 3px; margin-top: 35px;">**** **** **** ****</div>
        <div style="position: absolute; bottom: 20px; left: 20px; font-size: 14px;">BRUNVIL KERBY</div>
        <div style="position: absolute; bottom: 20px; right: 20px; font-weight: bold; color: #d4af37;">VISA</div>
    </div>

    <button class="btn-main" onclick="creerMaCarte()">CRÉER UNE CARTE ($19.00)</button>

    <h3 style="margin-top: 30px;">Istwa tranzaksyon</h3>
    <div class="history">
        <div class="history-item">
            <span style="color: #8b949e;">Pa gen tranzaksyon ankò</span>
        </div>
    </div>

    <script>
        async function creerMaCarte() {
            alert("Koneksyon ak sèvè Render...");
            try {
                const response = await fetch('https://live-exchange-2026-bot.onrender.com/create_card', { method: 'POST' });
                const data = await response.json();
                if(data.id || data.card_number) {
                    alert("Siksè! Kat ou an ap pwograme.");
                } else {
                    alert("Tcheke balans ou.");
                }
            } catch (e) {
                alert("Sèvè a okipe.");
            }
        }
    </script>
</body>
</html>
