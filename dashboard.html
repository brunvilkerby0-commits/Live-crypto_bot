<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Bot - Pro Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --green: #2ecc71; }
        body { background-color: var(--navy); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        
        .box { background: var(--card-dark); padding: 20px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2); margin: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; }
        
        /* STYLE KAT KI VIRE A (FLIP) */
        .flip-card { background-color: transparent; width: 100%; height: 200px; perspective: 1000px; margin-top: 15px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.is-flipped .flip-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 15px; border: 1px solid var(--gold); padding: 20px; box-sizing: border-box; }
        .card-front { background: linear-gradient(45deg, #001f3f, #003366); display: flex; flex-direction: column; justify-content: space-between; }
        .card-back { background: linear-gradient(45deg, #000, #222); transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; }

        input, select { width: 100%; padding: 12px; margin-top: 10px; background: var(--navy); border: 1px solid var(--gold); color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="main-content">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div style="color: var(--gold); font-weight: 800;">LIVE CRYPTO BOT</div>
            <div style="background: var(--gold); color: black; padding: 5px 10px; border-radius: 5px;">BK</div>
        </div>

        <div class="box">
            <div style="display: flex; justify-content: space-between;">
                <div>
                    <div style="font-size: 11px; opacity: 0.7;">BALANS HTG</div>
                    <div style="font-size: 24px; font-weight: bold; color: var(--gold);">0.00 HTG</div>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 11px; opacity: 0.7;">BALANS USDT</div>
                    <div style="font-size: 24px; font-weight: bold; color: white;">0.00 USDT</div>
                </div>
            </div>
        </div>

        <div class="box">
            <h3>Mande Kat Vityèl</h3>
            <p style="font-size: 12px; opacity: 0.8;">Klike sou kat la pou wè kòd sekrè a (CVV).</p>
            
            <div class="flip-card" id="myCard" onclick="this.classList.toggle('is-flipped')">
                <div class="flip-card-inner">
                    <div class="card-front">
                        <div style="text-align: right; font-weight: bold; color: var(--gold);">VISA</div>
                        <div style="font-size: 18px; letter-spacing: 4px; margin: 20px 0;">**** **** **** ****</div>
                        <div style="font-size: 12px;">BRUNVIL KERBY</div>
                    </div>
                    <div class="card-back">
                        <div>
                            <div style="font-size: 10px; opacity: 0.7;">CVV</div>
                            <div style="font-size: 18px; font-weight: bold; color: var(--gold);">***</div>
                            <div style="font-size: 10px; opacity: 0.7; margin-top: 10px;">EXP: 12/28</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="form-kreyasyon" style="margin-top: 20px;">
                <label>Enfòmasyon pou Bridgecard:</label>
                <div class="grid-2" style="padding: 0; margin-top: 10px;">
                    <input type="text" placeholder="Non">
                    <input type="text" placeholder="Prenon">
                </div>
                <input type="email" placeholder="Email ou">
                <input type="tel" placeholder="Telefòn (+509)">
                <button class="btn-gold" onclick="alert('Demann voye! N ap verifye balans ou.')">KREYE KAT ($11.00)</button>
            </div>
        </div>

        <div class="box">
            <h3>Depo & Retrè</h3>
            <select id="currency-type">
                <option value="htg">Goud (MonCash/Natcash)</option>
                <option value="usdt">USDT (Binance/TrustWallet)</option>
            </select>
            <input type="number" placeholder="Montan">
            <div class="grid-2" style="padding: 0; margin-top: 10px;">
                <button class="btn-gold" style="background: var(--green); color: white;">DEPOZE</button>
                <button class="btn-gold" style="background: #e74c3c; color: white;">RETIRE</button>
            </div>
        </div>

        <div class="box">
            <h3>Recharger PayPal</h3>
            <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px;">
                <small>Peye ak:</small>
                <div style="display: flex; gap: 20px; font-size: 12px; margin-top: 5px;">
                    <span><i class="fas fa-money-bill-wave" style="color: var(--gold);"></i> 0.00 HTG</span>
                    <span><i class="fas fa-coins" style="color: #3498db;"></i> 0.00 USDT</span>
                </div>
            </div>
            <input type="email" placeholder="Email PayPal pou resevwa lajan">
            <input type="number" placeholder="Montan $ ou vle">
            <button class="btn-gold">MANDE RECHAJ</button>
        </div>
    </div>

    <script>
        // Lojik pou chanje ant fòm yo ka ajoute la
    </script>
</body>
</html>
