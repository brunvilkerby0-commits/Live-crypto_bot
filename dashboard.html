<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Bot - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* HEADER */
        .top-bar { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: var(--card-dark); display: flex; align-items: center; 
            padding: 0 20px; box-sizing: border-box; z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            justify-content: space-between;
        }

        /* SIDEBAR / MENU DRAWNER */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--card-dark); z-index: 2000; transition: 0.3s;
            padding-top: 20px; border-right: 1px solid var(--gold);
        }
        .sidebar.active { left: 0; }
        .sidebar-header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(212, 175, 55, 0.3); }
        .sidebar-item {
            padding: 15px 25px; display: flex; align-items: center;
            cursor: pointer; transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-item i { margin-right: 15px; color: var(--gold); width: 20px; }
        .sidebar-item:hover { background: rgba(212, 175, 55, 0.1); }

        /* MAIN CONTENT */
        .main-container { margin-top: 80px; padding: 15px; }
        .page-section { display: none; animation: fadeIn 0.3s ease; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARDS & BUTTONS */
        .card { background: var(--card-dark); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; background: var(--navy); border: 1px solid var(--gold); color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="top-bar">
        <i class="fas fa-bars" style="font-size: 22px; color: var(--gold);" onclick="toggleMenu()"></i>
        <div style="font-weight: 900; color: var(--gold); letter-spacing: 1px;">LIVE CRYPTO BOT</div>
        <div style="background: var(--gold); color: black; padding: 4px 8px; border-radius: 5px; font-weight: bold;">BK</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div style="color: var(--gold); font-weight: bold;">@kerby</div>
            <div style="font-size: 18px; margin-top: 5px;">0.00 HTG</div>
            <div style="font-size: 12px; opacity: 0.6;">0.00 USDT</div>
        </div>
        <div class="sidebar-item" onclick="showPage('dashboard')"><i class="fas fa-home"></i> Dashboard</div>
        <div class="sidebar-item" onclick="showPage('kat')"><i class="fas fa-credit-card"></i> Kat Vityèl (Visa/MC)</div>
        <div class="sidebar-item" onclick="showPage('mache')"><i class="fas fa-store"></i> Mache USDT</div>
        <div class="sidebar-item" onclick="showPage('recharger')"><i class="fas fa-plus-circle"></i> Recharger</div>
        <div class="sidebar-item" onclick="showPage('depot')"><i class="fas fa-arrow-down"></i> Dépôt</div>
        <div class="sidebar-item" onclick="showPage('retrait')"><i class="fas fa-arrow-up"></i> Retrait</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="main-container">
        <div id="dashboard" class="page-section active">
            <div class="card" style="background: linear-gradient(135deg, #112240, #1a3060);">
                <small>BALANS HTG</small>
                <h2 style="color: var(--gold); margin: 5px 0;">0.00 HTG</h2>
                <small>BALANS USDT</small>
                <div style="font-weight: bold;">0.00 USDT</div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="card" style="text-align: center;" onclick="showPage('kat')"><i class="fas fa-credit-card" style="color: var(--gold);"></i><br>Kat</div>
                <div class="card" style="text-align: center;"><i class="fas fa-desktop" style="color: var(--gold);"></i><br>Netflix</div>
            </div>
        </div>

        <div id="recharger" class="page-section">
            <h2 style="color: var(--gold);">Recharger Kont Ou</h2>
            <div class="card">
                <select id="recharge-type">
                    <option value="paypal">PayPal (Frè: 5%)</option>
                    <option value="zelle">Zelle</option>
                    <option value="cashapp">CashApp</option>
                </select>
                <input type="email" placeholder="Email ou">
                <input type="number" placeholder="Montan $">
                <button class="btn-gold">MANDE RECHAJ</button>
            </div>
        </div>

        <div id="depot" class="page-section">
            <h2 style="color: var(--gold);">Fè yon Dépôt</h2>
            <div class="card">
                <select id="depot-method" onchange="checkDepotMethod()">
                    <option value="moncash">MonCash</option>
                    <option value="natcash">Natcash</option>
                    <option value="bep20">USDT (BEP20)</option>
                </select>
                <div id="wallet-area" class="card" style="display:none; background: #000; margin-top: 15px;">
                    <small style="color: var(--gold);">ADRÈS WALLET PAW (BEP20):</small>
                    <div style="font-size: 11px; word-break: break-all; margin: 10px 0;">0x71C7656EC7ab88b098defB751B7401B5f6d8976F</div>
                    <button class="btn-gold" style="padding: 5px; font-size: 12px;">KOPYE ADRÈS</button>
                </div>
                <input type="number" placeholder="Montan">
                <button class="btn-gold" style="background: #2ecc71; color: white;">KONFIME</button>
            </div>
        </div>

        <div id="retrait" class="page-section">
            <h2 style="color: #e74c3c;">Fè yon Retrait</h2>
            <div class="card">
                <select>
                    <option>MonCash</option>
                    <option>Natcash</option>
                    <option>USDT (BEP20)</option>
                </select>
                <input type="number" placeholder="Montan">
                <input type="text" placeholder="Nimewo kont oswa Wallet">
                <button class="btn-gold" style="background: #e74c3c; color: white;">RETIRE LAJAN</button>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            toggleMenu();
        }
        function checkDepotMethod() {
            const method = document.getElementById('depot-method').value;
            document.getElementById('wallet-area').style.display = (method === 'bep20') ? 'block' : 'none';
        }
    </script>
</body>
</html>
