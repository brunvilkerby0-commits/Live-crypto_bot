<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Bot - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* HEADER FIXE */
        .top-bar { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: var(--card-dark); display: flex; align-items: center; 
            padding: 0 20px; box-sizing: border-box; z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            justify-content: space-between;
        }

        /* MENU SIDEBAR (DRAWER) */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--card-dark); z-index: 2000; transition: 0.3s;
            padding-top: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            padding: 15px 25px; display: flex; align-items: center;
            cursor: pointer; transition: 0.3s; font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-item i { margin-right: 15px; color: var(--gold); width: 20px; }
        .sidebar-item:hover { background: rgba(212, 175, 55, 0.1); color: var(--gold); }

        /* KONTNI PAJ YO */
        .main-container { margin-top: 80px; padding: 20px; transition: 0.3s; }
        .page-section { display: none; animation: fadeIn 0.4s ease; }
        .page-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* STYLES BOUTON & INPUT */
        .card { background: var(--card-dark); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; background: var(--navy); border: 1px solid var(--gold); color: white; border-radius: 8px; box-sizing: border-box; }

        /* OVERLAY LÈ MENU A OUVRI */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="top-bar">
        <i class="fas fa-bars" style="font-size: 24px; color: var(--gold); cursor: pointer;" onclick="toggleMenu()"></i>
        <div style="font-weight: 900; color: var(--gold);">LIVE CRYPTO BOT</div>
        <div style="background: var(--gold); color: black; padding: 4px 8px; border-radius: 5px; font-weight: bold;">BK</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="text-align: center; padding: 20px; border-bottom: 1px solid var(--gold);">
            <div style="font-size: 18px; font-weight: 800; color: var(--gold);">@kerby</div>
            <div style="font-size: 12px; opacity: 0.7;">ID: BK-2026</div>
        </div>
        <div class="sidebar-item" onclick="showPage('dashboard')"><i class="fas fa-home"></i> Dashboard</div>
        <div class="sidebar-item" onclick="showPage('kat')"><i class="fas fa-credit-card"></i> Kat Vityèl (Visa/MC)</div>
        <div class="sidebar-item" onclick="showPage('paypal')"><i class="fas fa-wallet"></i> Recharger PayPal</div>
        <div class="sidebar-item" onclick="showPage('mache')"><i class="fas fa-shopping-cart"></i> Mache USDT</div>
        <div class="sidebar-item" onclick="showPage('p2p')"><i class="fas fa-paper-plane"></i> Voye Lajan (P2P)</div>
        <div class="sidebar-item" onclick="showPage('depot')"><i class="fas fa-arrow-down"></i> Dépôt</div>
        <div class="sidebar-item" onclick="showPage('retrait')"><i class="fas fa-arrow-up"></i> Retrait</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="main-container">

        <div id="dashboard" class="page-section active">
            <div class="card" style="background: linear-gradient(135deg, #112240, #1a3060);">
                <small style="color: var(--gold);">BALANS TOTAL</small>
                <h1 style="margin: 5px 0;">0.00 HTG</h1>
                <p style="opacity: 0.7; font-size: 14px;">0.00 USDT</p>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="card" style="text-align: center;" onclick="showPage('kat')">
                    <i class="fas fa-credit-card" style="font-size: 30px; color: var(--gold);"></i>
                    <p>Kat</p>
                </div>
                <div class="card" style="text-align: center;" onclick="showPage('mache')">
                    <i class="fas fa-chart-line" style="font-size: 30px; color: var(--gold);"></i>
                    <p>Mache</p>
                </div>
            </div>
        </div>

        <div id="kat" class="page-section">
            <h2 style="color: var(--gold);">Kat Vityèl</h2>
            <div class="card">
                <p>Mande yon kat Bridgecard pou sèlman $11.00</p>
                <input type="text" placeholder="Non & Prenon">
                <input type="email" placeholder="Email">
                <button class="btn-gold">KREYE KAT</button>
            </div>
        </div>

        <div id="paypal" class="page-section">
            <h2 style="color: var(--gold);">Recharger PayPal</h2>
            <div class="card">
                <input type="email" placeholder="Email PayPal">
                <input type="number" placeholder="Montan $">
                <button class="btn-gold">MANDE RECHAJ</button>
            </div>
        </div>

        <div id="depot" class="page-section">
            <h2 style="color: var(--gold);">Fè yon Dépôt</h2>
            <div class="card">
                <select>
                    <option>MonCash</option>
                    <option>Natcash</option>
                    <option>USDT (TRC20)</option>
                </select>
                <input type="number" placeholder="Montan">
                <button class="btn-gold" style="background: #2ecc71; color: white;">KONFIME DEPO</button>
            </div>
        </div>

    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function showPage(pageId) {
            // Kache tout seksyon yo
            const sections = document.querySelectorAll('.page-section');
            sections.forEach(s => s.classList.remove('active'));

            // Montre sa nou vle a
            document.getElementById(pageId).classList.add('active');

            // Fèmen menu a
            toggleMenu();

            // Chanje tit la nan top-bar la si nou vle
            console.log("Paj chanje a: " + pageId);
        }
    </script>
</body>
</html>
