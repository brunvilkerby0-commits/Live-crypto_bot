<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sécurité - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-navy: #0a192f;
            --card-blue: #112240;
            --accent-blue: #0063e5;
            --text-main: #ccd6f6;
            --gold: #d4af37;
            --error: #ff4d4d;
            --success: #2ecc71;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-navy);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .container { width: 90%; max-width: 400px; margin-top: 30px; }

        .header { text-align: center; margin-bottom: 25px; }
        .header i { font-size: 45px; color: var(--accent-blue); margin-bottom: 10px; }
        .header h1 { font-size: 20px; color: var(--gold); text-transform: uppercase; margin: 5px 0; }

        .security-card {
            background: var(--card-blue);
            padding: 25px; border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 12px; color: var(--text-main); }

        .field-wrapper { position: relative; display: flex; align-items: center; }
        .field-wrapper i { position: absolute; left: 15px; color: var(--accent-blue); font-size: 14px; }
        
        .field-wrapper input {
            width: 100%; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 14px 14px 45px; border-radius: 14px;
            color: white; font-size: 14px; outline: none; transition: 0.3s;
        }

        .field-wrapper input:focus { border-color: var(--accent-blue); background: rgba(0, 99, 229, 0.05); }

        .btn-update {
            width: 100%; padding: 16px; background: var(--accent-blue);
            color: white; border: none; border-radius: 14px;
            font-weight: 800; font-size: 15px; cursor: pointer;
            margin-top: 10px; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0, 99, 229, 0.3);
        }

        .status-msg {
            font-size: 12px; text-align: center; margin-top: 15px;
            padding: 10px; border-radius: 8px; display: none;
        }

        .info-text { font-size: 11px; color: #8892b0; text-align: center; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <i class="fas fa-shield-alt"></i>
        <h1>SÉCURITÉ DU COMPTE</h1>
        <p style="font-size: 11px; opacity: 0.7;">Gérez votre mot de passe Live Crypto Bot</p>
    </div>

    <div class="security-card">
        <div class="input-group">
            <label>Ancien Mot de Passe</label>
            <div class="field-wrapper">
                <i class="fas fa-unlock"></i>
                <input type="password" id="old-pass" placeholder="Entrez votre mot de passe actuel">
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 20px 0;">

        <div class="input-group">
            <label>Nouveau Mot de Passe</label>
            <div class="field-wrapper">
                <i class="fas fa-key"></i>
                <input type="password" id="new-pass" placeholder="Minimum 6 caractères">
            </div>
        </div>

        <div class="input-group">
            <label>Confirmer le Nouveau</label>
            <div class="field-wrapper">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="confirm-pass" placeholder="Répétez le nouveau">
            </div>
        </div>

        <button class="btn-update" onclick="validateSecurity()">
            Mettre à jour maintenant
        </button>

        <div id="status" class="status-msg"></div>
    </div>

    <p class="info-text">
        <i class="fas fa-info-circle"></i> 
        Pour votre sécurité, nous vérifions l'ancien mot de passe avant d'appliquer tout changement à votre compte.
    </p>

    <div style="text-align: center; margin-top: 20px;">
        <button onclick="window.history.back()" style="background:none; border:none; color:var(--accent-blue); font-weight:bold; cursor:pointer;">
            <i class="fas fa-arrow-left"></i> Retour
        </button>
    </div>
</div>

<script>
    function validateSecurity() {
        const oldP = document.getElementById('old-pass').value;
        const newP = document.getElementById('new-pass').value;
        const confP = document.getElementById('confirm-pass').value;
        const status = document.getElementById('status');
        const btn = document.querySelector('.btn-update');

        // Reset
        status.style.display = "none";

        if(!oldP || !newP || !confP) {
            showMsg("Erreur: Veuillez remplir tous les champs.", "#ff4d4d", "rgba(255, 77, 77, 0.1)");
            return;
        }

        if(newP !== confP) {
            showMsg("Erreur: Les nouveaux mots de passe ne correspondent pas.", "#ff4d4d", "rgba(255, 77, 77, 0.1)");
            return;
        }

        if(newP.length < 6) {
            showMsg("Erreur: Le nouveau mot de passe est trop court.", "#ff4d4d", "rgba(255, 77, 77, 0.1)");
            return;
        }

        // Feedback pwofesyonèl
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Vérification en cours...';
        btn.disabled = true;

        // Isit la Firebase ap verifye si "oldP" matche ak sa k nan baz done a
        setTimeout(() => {
            btn.innerHTML = 'Mettre à jour maintenant';
            btn.disabled = false;
            
            // Simulation siksè
            showMsg("Succès: Votre sécurité a été mise à jour! ✅", "#2ecc71", "rgba(46, 204, 113, 0.1)");
            
            // Netwaye bwat yo
            document.getElementById('old-pass').value = "";
            document.getElementById('new-pass').value = "";
            document.getElementById('confirm-pass').value = "";
        }, 2500);
    }

    function showMsg(txt, color, bgColor) {
        const status = document.getElementById('status');
        status.innerText = txt;
        status.style.color = color;
        status.style.backgroundColor = bgColor;
        status.style.display = "block";
    }
</script>

</body>
</html>
