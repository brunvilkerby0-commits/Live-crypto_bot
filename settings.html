<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramètres - Live Crypto Bot</title>
    <style>
        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            background-color: #0b1426; color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            touch-action: none;
        }

        .container { 
            background-color: #111d35; width: 88%; max-width: 380px; 
            border-radius: 25px; padding: 20px; border: 1px solid #1a263d; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            /* Sa anpeche l parèt twò long */
            max-height: 90vh; overflow-y: auto;
        }

        .header h2 { 
            color: #f3ba2f; text-align: center; text-transform: uppercase; 
            font-size: 1.2em; letter-spacing: 1px; margin-bottom: 20px;
        }
        
        .profile-card { 
            background: rgba(243, 186, 47, 0.05); 
            padding: 15px; border-radius: 18px; 
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 20px; border: 1px solid #1a263d;
        }

        .avatar { 
            width: 50px; height: 50px; background: #f3ba2f; 
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; font-weight: bold; color: #0b1426; font-size: 1.2em;
        }

        .menu-list { display: flex; flex-direction: column; gap: 10px; }
        
        /* Tout bouton yo ka klike kounye a */
        .menu-item {
            background: #1a263d; padding: 14px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s; border: 1px solid transparent;
            text-decoration: none; color: white;
        }

        .menu-item:active { transform: scale(0.97); background: #1e2d4a; border-color: #f3ba2f; }
        
        .label { display: flex; align-items: center; gap: 12px; font-size: 0.9em; }
        .icon-gold { color: #f3ba2f; font-size: 1.1em; }

        .btn-exit {
            margin-top: 25px; width: 100%; background: rgba(229, 9, 20, 0.1);
            color: #ff4d4d; border: 1px solid #e50914; padding: 14px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 0.85em;
        }

        .btn-exit:active { background: #e50914; color: white; }

        .footer-tag { text-align: center; color: #444; font-size: 0.65em; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>Paramètres</h2></div>

    <div class="profile-card">
        <div class="avatar" id="userInitial">U</div>
        <div>
            <div id="userName" style="font-weight: bold; font-size: 1em; color: #f3ba2f;">Utilisateur</div>
            <div id="userID" style="font-size: 0.75em; color: #888;">UID: --</div>
        </div>
    </div>

    <div class="menu-list">
        <a href="#" class="menu-item">
            <div class="label"><span class="icon-gold">👤</span> Mon Profil</div>
            <span style="color:#444; font-size:0.7em;">▶</span>
        </a>
        <a href="#" class="menu-item">
            <div class="label"><span class="icon-gold">🔒</span> Sécurité</div>
            <span style="color:#444; font-size:0.7em;">▶</span>
        </a>
        <a href="#" class="menu-item">
            <div class="label"><span class="icon-gold">🌐</span> Langue (FR)</div>
            <span style="color:#444; font-size:0.7em;">▶</span>
        </a>
        <a href="#" class="menu-item">
            <div class="label"><span class="icon-gold">🔔</span> Notifications</div>
            <span style="color:#444; font-size:0.7em;">▶</span>
        </a>
    </div>

    <button class="btn-exit" onclick="window.location.href='index.html'">Déconnexion</button>

    <div class="footer-tag">LIVE CRYPTO BOT • V2.1</div>
</div>

<script>
    // Ti kòd pou chèche non ak ID moun nan (si w itilize localStorage)
    document.addEventListener('DOMContentLoaded', function() {
        const name = localStorage.getItem('userName') || "Utilisateur";
        const id = localStorage.getItem('userID') || "Non identifié";
        
        document.getElementById('userName').innerText = name;
        document.getElementById('userID').innerText = "UID: " + id;
        document.getElementById('userInitial').innerText = name.charAt(0).toUpperCase();
    });
</script>

</body>
</html>
