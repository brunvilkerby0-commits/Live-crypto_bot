<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Bot</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f111a; color: white; margin: 0; padding-bottom: 80px; }
        .top-bar { background: #1a1d29; padding: 15px; text-align: center; font-weight: bold; border-bottom: 2px solid #3b82f6; }
        .section { display: none; padding: 20px; }
        .active-section { display: block; }
        .card { background: #1a1d29; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .btn-main { background: #f59e0b; color: black; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .nav-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: #1a1d29; position: fixed; bottom: 0; width: 100%; padding: 10px 0; border-top: 1px solid #333; }
        .nav-btn { text-align: center; font-size: 10px; color: #888; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">LIVE CRYPTO BOT</div>

    <div id="maison" class="section active-section">
        <div class="card">
            <h3>Balans Aktiyèl</h3>
            <h1 style="color:#f59e0b;">0.00 USDT</h1>
        </div>
        <div class="card"><h3>📢 Anons</h3><p>Byenveni! 3 Siyal disponib chak jou.</p></div>
    </div>

    <div id="vip" class="section">
        <h2>🚀 Siyal VIP</h2>
        <div class="card">BTC/USDT <br> Entrée: 60,300 <br> <button class="btn-main">BUY</button></div>
    </div>

    <div id="recharger" class="section">
        <h2>Depoze Lajan</h2>
        <div class="card">
            <p>Network: TRC20</p>
            <input type="text" value="TUvxxxxxxxxxxxxxxx" readonly style="width:100%; padding:10px; background:#000; color:white;">
            <button class="btn-main">Generate Address</button>
        </div>
    </div>

    <div id="retrait" class="section">
        <h2>Retire Lajan</h2>
        <input type="number" placeholder="Montan (USDT)" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;">
        <input type="password" placeholder="Modpas Sekirite" style="width:100%; padding:12px; border-radius:8px;">
        <button class="btn-main">Konfème Retrè</button>
    </div>

    <div class="nav-bar">
        <div class="nav-btn" onclick="showSection('maison')">🏠<br>Maison</div>
        <div class="nav-btn" onclick="showSection('vip')">🚀<br>Siyal</div>
        <div class="nav-btn" onclick="showSection('recharger')">💰<br>Depo</div>
        <div class="nav-btn" onclick="showSection('retrait')">📤<br>Retre</div>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
        }
    </script>
</body>
</html>
