<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Live Crypto Bot - Recharge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .header { padding: 20px; display: flex; align-items: center; background: var(--card-dark); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .header a { color: var(--gold); text-decoration: none; margin-right: 20px; font-size: 20px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* SELEKSYON SÈVIS */
        .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .method-card { 
            background: var(--card-dark); border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .method-card.active { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.1); }
        .method-card i { font-size: 24px; color: var(--gold); margin-bottom: 8px; display: block; }
        
        .meru-logo { background: white; color: black; font-weight: 900; padding: 2px 6px; border-radius: 3px; font-size: 10px; display: inline-block; margin-bottom: 8px; }

        /* FORMILÈ */
        .form-box { background: var(--card-dark); padding: 20px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.1); }
        label { font-size: 11px; color: var(--gold); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input { 
            width: 100%; padding: 15px; background: #0a192f; border: 1px solid rgba(212, 175, 55, 0.2); 
            color: white; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-size: 15px; 
        }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; }

        /* ERROR MESSAGE */
        #errorMsg { color: #ff4d4d; font-size: 12px; text-align: center; margin-bottom: 15px; display: none; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html"><i class="fas fa-arrow-left"></i></a>
        <div style="font-weight: 800; letter-spacing: 1px;">RECHARGE DE SERVICE</div>
    </div>

    <div class="container">
        <div class="payment-grid">
            <div class="method-card active" onclick="updateForm('meru', this)">
                <div class="meru-logo">MERU</div>
                <div style="font-size: 11px; font-weight: bold;">VISA / MC</div>
            </div>
            <div class="method-card" onclick="updateForm('paypal', this)">
                <i class="fab fa-paypal"></i>
                <div style="font-size: 11px; font-weight: bold;">PAYPAL</div>
            </div>
            <div class="method-card" onclick="updateForm('wise', this)">
                <i class="fas fa-university"></i>
                <div style="font-size: 11px; font-weight: bold;">WISE</div>
            </div>
            <div class="method-card" onclick="updateForm('visa', this)">
                <i class="fas fa-credit-card"></i>
                <div style="font-size: 11px; font-weight: bold;">VISA CARD</div>
            </div>
        </div>

        <div class="form-box">
            <div id="errorMsg"></div>
            <div id="dynamicTitle" style="text-align: center; color: var(--gold); font-weight: bold; margin-bottom: 20px; font-size: 16px;">RECHARGE MERU VISA/MC</div>

            <label id="labelID">Numéro de Carte Meru</label>
            <input type="text" id="inputID" placeholder="Ex: 4500 **** **** ****">

            <label id="labelEmail">E-mail lié au compte</label>
            <input type="email" id="inputEmail" placeholder="votre@email.com">

            <label>Montant à recharger ($)</label>
            <input type="number" id="inputAmount" placeholder="0.00">

            <label>PIN de sécurité du site</label>
            <input type="password" id="inputPin" maxlength="4" placeholder="****">

            <button class="btn-gold" onclick="validateAction()">VALIDER LA RECHARGE</button>
        </div>
    </div>

    <script>
        let currentMode = 'meru';

        function updateForm(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('errorMsg').style.display = 'none';

            const title = document.getElementById('dynamicTitle');
            const labelID = document.getElementById('labelID');
            const inputID = document.getElementById('inputID');

            if(mode === 'meru') {
                title.innerText = "RECHARGE MERU VISA/MC";
                labelID.innerText = "Numéro de Carte Meru";
                inputID.placeholder = "Ex: 4500 **** **** ****";
            } else if(mode === 'paypal') {
                title.innerText = "RECHARGE PAYPAL";
                labelID.innerText = "E-mail PayPal";
                inputID.placeholder = "Ex: paypal@votreemail.com";
            } else if(mode === 'wise') {
                title.innerText = "RECHARGE WISE";
                labelID.innerText = "E-mail ou ID Wise";
                inputID.placeholder = "Ex: ID12345678 oswa email";
            } else if(mode === 'visa') {
                title.innerText = "RECHARGE VISA/MASTERCARD";
                labelID.innerText = "Numéro de la Carte";
                inputID.placeholder = "Ex: 4111 **** **** ****";
            }
        }

        function validateAction() {
            const id = document.getElementById('inputID').value;
            const email = document.getElementById('inputEmail').value;
            const amount = document.getElementById('inputAmount').value;
            const pin = document.getElementById('inputPin').value;
            const errorBox = document.getElementById('errorMsg');

            // SIMILASYON VERIFIKASYON REYÈL
            if(!id || !email || !amount || !pin) {
                errorBox.innerText = "Erreur: Tous les champs sont obligatoires.";
                errorBox.style.display = 'block';
                return;
            }

            if(pin !== "1234") { // Egzanp si PIN nan pa bon
                errorBox.innerText = "Erreur: PIN de sécurité incorrect. Veuillez réessayer.";
                errorBox.style.display = 'block';
                return;
            }

            alert("Demande de recharge pour " + currentMode.toUpperCase() + " envoyée.\nTraitement en cours...");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
