<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Bot - Cartes Visa</title>
    <style>
        body { background-color: #001f3f; color: white; font-family: Arial, sans-serif; text-align: center; }
        .container { display: flex; justify-content: space-around; flex-wrap: wrap; padding: 50px; }
        .card-box { 
            background: linear-gradient(145deg, #001f3f, #003366);
            border: 2px solid #FFD700; 
            border-radius: 15px; 
            padding: 20px; 
            width: 250px; 
            margin: 10px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
        h2 { color: #FFD700; }
        .price { font-size: 24px; font-weight: bold; margin: 15px 0; }
        button { 
            background-color: #FFD700; 
            color: #001f3f; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer;
        }
        button:hover { background-color: #e6c200; }
        #status-msg { margin-top: 20px; font-weight: bold; color: #FFD700; }
    </style>
</head>
<body>
    <h1>Choisissez votre Carte Visa Virtuelle</h1>
    
    <div class="container">
        <div class="card-box">
            <h2>Visa Standard</h2>
            <p>Netflix, Spotify, Shein</p>
            <div class="price">$15.00</div>
            <p>(Inclut $2 de balance)</p>
            <button onclick="orderCard('standard')">Commander</button>
        </div>

        <div class="card-box">
            <h2>Visa Business</h2>
            <p>FB Ads, Google Ads, Amazon</p>
            <div class="price">$20.00</div>
            <p>(Inclut $2 de balance)</p>
            <button onclick="orderCard('business')">Commander</button>
        </div>

        <div class="card-box">
            <h2>Visa Platinum</h2>
            <p>Limites élevées & Support VIP</p>
            <div class="price">$22.00</div>
            <p>(Inclut $2 de balance)</p>
            <button onclick="orderCard('platinum')">Commander</button>
        </div>
    </div>

    <div id="status-msg"></div>

    <script>
        function orderCard(type) {
            const msg = document.getElementById('status-msg');
            msg.innerText = "Connexion au serveur Bridgecard en cours...";

            // Nou voye lòd la bay server.js (Node)
            fetch('/create_card', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ card_type: type })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success' || data.card_number) {
                    msg.innerHTML = "🎉 Succès! Votre carte " + type + " est prête.<br>Numéro: " + (data.card_number || data.data.card_number);
                } else {
                    msg.innerText = "Erreur: " + (data.message || "Échec de la création.");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                msg.innerText = "Erreur de connexion au bot.";
            });
        }
    </script>
</body>
</html>
