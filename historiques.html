<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>History - Live Crypto Bot</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            background-color: #0b1426; color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .container { 
            background-color: #111d35; width: 90%; max-width: 380px; 
            height: 85vh; border-radius: 25px; padding: 20px; 
            border: 1px solid #1a263d; display: flex; flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .header h2 { color: #f3ba2f; text-transform: uppercase; font-size: 1.1em; letter-spacing: 1px; margin: 0; flex-grow: 1; text-align: center; }
        
        .btn-back { color: #f3ba2f; text-decoration: none; font-size: 1.5em; width: 30px; }

        .transaction-list { 
            flex-grow: 1; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 10px; padding-right: 5px;
        }

        .tr-item {
            background: #1a263d; padding: 15px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #1e2d4a;
        }

        .tr-info div { font-size: 0.85em; font-weight: bold; color: #fff; }
        .tr-date { font-size: 0.7em; color: #64748b; margin-top: 4px; }
        
        .tr-amount { text-align: right; }
        .amount-val { font-weight: bold; color: #f3ba2f; font-size: 0.95em; }
        .status { font-size: 0.65em; text-transform: uppercase; margin-top: 4px; color: #00ff88; }

        .transaction-list::-webkit-scrollbar { width: 3px; }
        .transaction-list::-webkit-scrollbar-thumb { background: #f3ba2f; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="btn-back">‹</a>
        <h2>Historique</h2>
    </div>

    <div class="transaction-list">
        <div class="tr-item">
            <div class="tr-info">
                <div>Dépôt USDT (BEP20)</div>
                <div class="tr-date">04 Mai 2026 • 10:15</div>
            </div>
            <div class="tr-amount">
                <div class="amount-val">+ 100.00</div>
                <div class="status">Réussi</div>
            </div>
        </div>

        <div class="tr-item">
            <div class="tr-info">
                <div>Bonus Inscription</div>
                <div class="tr-date">04 Mai 2026 • 08:00</div>
            </div>
            <div class="tr-amount">
                <div class="amount-val">+ 5.00</div>
                <div class="status">Réussi</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
