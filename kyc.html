<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Détails du Titulaire - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header-title { color: var(--gold); text-align: center; text-transform: uppercase; font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        .sub-desc { text-align: center; font-size: 12px; opacity: 0.7; margin-bottom: 20px; }

        /* BOX PLAN AN KI DINAMIK */
        .plan-box { 
            background: rgba(212, 175, 55, 0.05); border: 2px solid var(--gold); 
            padding: 15px; border-radius: 12px; text-align: center; 
            margin-bottom: 25px; font-size: 24px; font-weight: 900; color: white;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: var(--gold); font-size: 13px; font-weight: bold; margin-bottom: 6px; }
        .form-group input { 
            width: 100%; background: var(--card); border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 12px; border-radius: 10px; color: white; box-sizing: border-box; outline: none;
        }

        /* KYC FOTO */
        .kyc-section { border-top: 1px dashed rgba(212, 175, 55, 0.3); margin-top: 25px; padding-top: 20px; }
        .kyc-label { color: var(--gold); font-size: 14px; font-weight: 800; margin-bottom: 15px; display: block; }
        .kyc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .upload-box { 
            background: var(--card); border: 2px solid var(--gold); border-radius: 12px; 
            padding: 20px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .upload-box i { font-size: 28px; color: var(--gold); margin-bottom: 8px; }
        .upload-box span { display: block; font-size: 12px; font-weight: bold; }

        .btn-pay { 
            width: 100%; background: var(--gold); color: var(--navy); border: none; 
            padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 900; 
            margin-top: 30px; cursor: pointer; text-transform: uppercase;
        }
        .btn-pay:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="header-title">Détails du Titulaire</div>
    <div class="sub-desc">Remplissez les informations pour votre carte VISA/Mastercard</div>

    <div class="plan-box">
        Plan: <span id="valeur-plan">--</span> USDT
    </div>

    <div class="form-group">
        <label>Prénom</label>
        <input type="text" placeholder="Ex: Jean">
    </div>
    <div class="form-group">
        <label>Nom</label>
        <input type="text" placeholder="Ex: Dupont">
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="votre@email.com">
    </div>
    <div class="form-group">
        <label>Téléphone</label>
        <input type="text" placeholder="+509 0000 0000">
    </div>

    <div class="kyc-section">
        <span class="kyc-label">VÉRIFICATION D'IDENTITÉ (KYC)</span>
        <div class="kyc-grid">
            <div class="upload-box" onclick="document.getElementById('file-front').click()">
                <i class="fas fa-camera"></i>
                <span id="txt-front">Devan ID</span>
                <input type="file" id="file-front" hidden onchange="done('front')">
            </div>
            <div class="upload-box" onclick="document.getElementById('file-back').click()">
                <i class="fas fa-camera"></i>
                <span id="txt-back">Dèyè ID</span>
                <input type="file" id="file-back" hidden onchange="done('back')">
            </div>
        </div>
    </div>

    <button class="btn-pay" id="main-btn">
        Peye <span id="btn-price">--</span> USDT & Kòmande
    </button>

    <script>
        // LOJIK POU CHACHE PRI A NAN LYEN AN
        const params = new URLSearchParams(window.location.search);
        const priKat = params.get('price');

        // Si gen yon pri, nou mete l. Si pa genyen, nou mete 15 pa defo.
        const prixFinal = priKat ? priKat : "15";

        document.getElementById('valeur-plan').innerText = prixFinal;
        document.getElementById('btn-price').innerText = prixFinal;

        // Feedback lè foto a monte
        function done(side) {
            if(side === 'front') document.getElementById('txt-front').innerHTML = "<i class='fas fa-check-circle'></i> OK";
            if(side === 'back') document.getElementById('txt-back').innerHTML = "<i class='fas fa-check-circle'></i> OK";
        }
    </script>

</body>
</html>
