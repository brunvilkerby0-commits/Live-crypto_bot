<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dépôt Live Crypto Bot</title>
    <style>
        body { background-color: #0b1426; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background-color: #111d35; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #1a263d; }
        h2 { color: #f3ba2f; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: #1a263d; padding: 15px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .card:active { border-color: #f3ba2f; background: #23314d; }
        .card img { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; }
        .card p { margin: 5px 0 0; font-size: 0.8em; font-weight: bold; color: #cbd5e0; }
        #info-box { display: none; background: #050a14; border: 1px solid #f3ba2f; padding: 15px; border-radius: 15px; margin-top: 20px; animation: fadeIn 0.4s; }
        .addr-text { background: #000; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.85em; word-break: break-all; color: #fff; margin: 10px 0; border: 1px solid #333; }
        .btn-copy { background: #e50914; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>SELEKSYONE METÒD LA</h2>

    <div class="grid">
        <div class="card" onclick="show('BEP20', '0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396')">
            <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" alt="BEP20">
            <p>BEP20</p>
        </div>
        <div class="card" onclick="show('TRC20', 'TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy')">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" alt="TRC20">
            <p>TRC20</p>
        </div>
        <div class="card" onclick="show('TRON', 'TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy')">
            <img src="https://cryptologos.cc/logos/tron-trx-logo.png" alt="TRON">
            <p>TRON</p>
        </div>
        <div class="card" onclick="show('MONCASH', '31800614')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d1/Digicel_logo.png" alt="MonCash">
            <p>MonCash</p>
        </div>
        <div class="card" onclick="show('NATCASH', '32695844')" style="grid-column: span 2;">
            <img src="https://www.natcom.com.ht/img/logo.png" alt="NatCash">
            <p>NatCash</p>
        </div>
    </div>

    <div id="info-box">
        <p id="method-name" style="color: #f3ba2f; font-weight: bold; font-size: 0.9em; margin-bottom: 5px;"></p>
        <div id="method-value" class="addr-text"></div>
        <button class="btn-copy" onclick="copyText()">KOPYE ENFÒMASYON</button>
    </div>

    <p style="font-size: 0.7em; color: #4a5568; margin-top: 30px;">Sèvis sekirize pa Live Crypto Bot</p>
</div>

<script>
    function show(name, val) {
        document.getElementById('info-box').style.display = 'block';
        document.getElementById('method-name').innerText = "LIVBOT " + name;
        document.getElementById('method-value').innerText = val;
    }

    function copyText() {
        const val = document.getElementById('method-value').innerText;
        navigator.clipboard.writeText(val).then(() => {
            alert("Kopye: " + val);
        });
    }
</script>

</body>
</html>
