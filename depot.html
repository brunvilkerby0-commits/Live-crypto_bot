<div id="main-deposit" style="background:#0b1426; font-family:sans-serif; max-width:450px; margin:auto; padding:20px; border-radius:20px; color:white;">
    <h2 style="color:#f3ba2f; text-align:center; text-transform:uppercase;">Sélectionne la méthode</h2>

    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px;">
        <div onclick="setMethod('BEP20', '0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396', 'crypto')" style="background:#1a263d; padding:15px; border-radius:12px; text-align:center; cursor:pointer; border:1px solid #333;">
            <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" width="25"><br><small>BEP20</small>
        </div>
        <div onclick="setMethod('TRC20', 'TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy', 'crypto')" style="background:#1a263d; padding:15px; border-radius:12px; text-align:center; cursor:pointer; border:2px solid #f3ba2f;">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" width="25"><br><small>TRC20</small>
        </div>
        <div onclick="setMethod('TRON', 'TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy', 'crypto')" style="background:#1a263d; padding:15px; border-radius:12px; text-align:center; cursor:pointer; border:1px solid #333;">
            <img src="https://cryptologos.cc/logos/tron-trx-logo.png" width="25"><br><small>TRON</small>
        </div>
    </div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
        <div onclick="setMethod('MONCASH', '31800614', 'manual')" style="background:#1a263d; padding:15px; border-radius:12px; text-align:center; cursor:pointer;">
            <img src="https://moncash.digicelgroup.com/content/images/moncash-logo.png" height="20"><br><small>MonCash</small>
        </div>
        <div onclick="setMethod('NATCASH', '32695844', 'manual')" style="background:#1a263d; padding:15px; border-radius:12px; text-align:center; cursor:pointer;">
            <img src="https://www.natcom.com.ht/img/logo.png" height="20"><br><small>Natcash</small>
        </div>
    </div>

    <div id="display-box" style="background:black; border:1px dashed red; padding:15px; border-radius:15px; text-align:center;">
        <p id="title-show" style="color:#f3ba2f; font-weight:bold; font-size:0.8em;"></p>
        <p id="addr-show" style="font-family:monospace; margin:10px 0; font-size:0.9em; word-break:break-all;"></p>
        <button onclick="copyAddr()" style="width:100%; background:red; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">KOPYE ENFÒMASYON</button>
    </div>

    <div style="margin-top:20px;">
        <label id="label-id" style="font-size:0.8em; color:#888;">ID TRANZAKSYON / NIP</label>
        <input type="text" placeholder="ID peman an" style="width:100%; background:#1a263d; border:1px solid #333; padding:12px; border-radius:8px; color:white; margin:10px 0;">
        <button style="width:100%; background:red; color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; font-size:1em;">KONFIME PEMAN</button>
    </div>
</div>

<script>
function setMethod(name, val, type) {
    document.getElementById('title-show').innerText = "ADRÈS " + name;
    document.getElementById('addr-show').innerText = val;
}
function copyAddr() {
    const text = document.getElementById('addr-show').innerText;
    navigator.clipboard.writeText(text);
    alert("Kopye nan bous ou!");
}
</script>
