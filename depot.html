<div id="deposit-section" style="background: #0b1120; color: white; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; font-family: sans-serif; border: 1px solid #1e293b;">
    
    <h3 style="text-align: center; color: #fbbf24; margin-bottom: 20px;">CHWAZI METÒD DEPO</h3>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
        <div onclick="switchDepo('moncash')" id="m-moncash" class="m-btn active">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/MonCash_logo.png" width="25"><br>MonCash
        </div>
        <div onclick="switchDepo('natcash')" id="m-natcash" class="m-btn">
            <img src="https://upload.wikimedia.org/wikipedia/pt/1/13/Logo_Natcom.png" width="25"><br>Natcash
        </div>
        <div onclick="switchDepo('bep20')" id="m-bep20" class="m-btn">
            <img src="https://cryptologos.cc/logos/binance-usd-busd-logo.png" width="25"><br>BEP20
        </div>
        <div onclick="switchDepo('trc20')" id="m-trc20" class="m-btn">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" width="25"><br>TRC20
        </div>
        <div onclick="switchDepo('trx')" id="m-trx" class="m-btn" style="grid-column: span 2;">
            <img src="https://cryptologos.cc/logos/tron-trx-logo.png" width="25"><br>TRX (TRON)
        </div>
    </div>

    <div style="background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        <p id="depo-label" style="font-size: 12px; color: #94a3b8; margin: 0 0 5px 0;">Voye kòb la sou nimewo sa:</p>
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <strong id="depo-addr" style="font-size: 14px; color: #f8fafc; word-break: break-all;">44xx-xxxx</strong>
            <button onclick="copyAddr()" style="background: #fbbf24; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer;">📋</button>
        </div>
    </div>

    <input type="number" id="amt" placeholder="Montan ou voye a" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; outline: none;">
    
    <input type="text" id="hash" placeholder="ID Tranzaksyon (Nip oswa Hash)" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; outline: none;">
    
    <label style="font-size: 12px; color: #94a3b8; display: block; margin-bottom: 5px;">Voye screenshot peman an:</label>
    <input type="file" id="img-proof" style="width: 100%; color: #94a3b8; margin-bottom: 20px; font-size: 12px;">

    <button onclick="finaliseDepo()" style="width: 100%; padding: 15px; background: #fbbf24; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px;">KONFIRMER LE DÉPÔT</button>

</div>

<style>
    .m-btn { background: #1e293b; padding: 10px 5px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid transparent; font-size: 10px; color: #94a3b8; }
    .active { border-color: #fbbf24; background: #0f172a; color: white; }
</style>

<script>
    const depoData = {
        moncash: { label: "Nimewo MonCash nou:", val: "44xx-xxxx" },
        natcash: { label: "Nimewo Natcash nou:", val: "40xx-xxxx" },
        bep20: { label: "Adrès USDT (BEP20):", val: "0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396" },
        trc20: { label: "Adrès USDT (TRC20):", val: "TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy" },
        trx: { label: "Adrès TRON (TRX):", val: "TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy" }
    };

    function switchDepo(id) {
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-'+id).classList.add('active');
        document.getElementById('depo-label').innerText = depoData[id].label;
        document.getElementById('depo-addr').innerText = depoData[id].val;
    }

    function copyAddr() {
        let t = document.getElementById('depo-addr').innerText;
        navigator.clipboard.writeText(t);
        alert("Kopye!");
    }

    function finaliseDepo() {
        let amt = document.getElementById('amt').value;
        let hash = document.getElementById('hash').value;
        let img = document.getElementById('img-proof').files[0];

        if(!amt || !hash || !img) {
            alert("Tanpri ranpli tout bwat yo!");
            return;
        }
        alert("Demann voye! Admin ap verifye sa.");
    }
</script>
