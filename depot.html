<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Live Crypto Bot - Dépôt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        .header { padding: 20px; display: flex; align-items: center; background: var(--card-dark); border-bottom: 1px solid rgba(212, 175, 55, 0.2); position: sticky; top: 0; z-index: 1000; }
        .header a { color: var(--gold); text-decoration: none; margin-right: 20px; font-size: 20px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        .net-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(65px, 1fr)); gap: 5px; margin-bottom: 20px; }
        .net-card { background: var(--card-dark); border: 1px solid rgba(212, 175, 55, 0.1); padding: 8px 1px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .net-card.active { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.1); }
        .net-card.moncash.active { border-color: #ff4d4d; background: rgba(255, 77, 77, 0.1); }
        .net-card.natcash.active { border-color: #4da6ff; background: rgba(77, 166, 255, 0.1); }
        
        .net-card img { width: 24px; height: 24px; margin-bottom: 5px; border-radius: 4px; object-fit: contain; }
        .net-card span { font-size: 8px; font-weight: bold; display: block; color: var(--text); }
        
        .addr-display { background: #000; border: 1px dashed var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .addr-text { font-size: 13px; color: #fff; word-break: break-all; font-family: 'Courier New', monospace; display: block; margin: 10px 0; font-weight: bold; }
        .btn-copy { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; }
        
        .form-box { background: var(--card-dark); padding: 20px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.1); }
        label { font-size: 11px; color: var(--gold); font-weight: bold; display: block; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; background: #0a192f; border: 1px solid rgba(212, 175, 55, 0.2); color: white; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        .file-input-label { display: block; width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(212, 175, 55, 0.5); border-radius: 10px; text-align: center; cursor: pointer; margin-bottom: 20px; color: var(--gold); font-size: 13px; }
        .calc-box { font-size: 13px; color: #8892b0; margin-bottom: 15px; text-align: right; font-weight: bold; }
        .btn-confirm { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <a href="dashboard.html"><i class="fas fa-arrow-left"></i></a>
        <div style="font-weight: 800; color: var(--gold);">DÉPÔT DE FONDS</div>
    </div>

    <div class="container">
        <label>1. Sélectionnez la méthode</label>
        <div class="net-grid">
            <div class="net-card active" onclick="changeNet('USDT BEP20', '0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396', 'USDT', this)">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png?v=025"><span>BEP20</span>
            </div>
            <div class="net-card" onclick="changeNet('USDT TRC20', 'TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy', 'USDT', this)">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png?v=025"><span>TRC20</span>
            </div>
            <div class="net-card" onclick="changeNet('TRON (TRX)', 'TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy', 'TRX', this)">
                <img src="https://cryptologos.cc/logos/tron-trx-logo.png?v=025"><span>TRON</span>
            </div>
            <div class="net-card moncash" onclick="changeNet('MonCash', '31800614', 'HTG', this, 'Brunvil Kerby')">
                <img src="https://i.ibb.co/L5p5z1h/moncash.png"><span>MonCash</span>
            </div>
            <div class="net-card natcash" onclick="changeNet('Natcash', '32696844', 'HTG', this, 'Brunvil Kerby')">
                <img src="https://i.ibb.co/hV4S6vN/natcash.png"><span>Natcash</span>
            </div>
        </div>

        <div class="addr-display">
            <div id="curNet" style="font-size: 10px; color: var(--gold); font-weight: 800;">ADRESSE USDT BEP20</div>
            <div id="ownerName" style="color: #fff; font-size: 11px; margin-top: 5px; display: none;">NOM: Brunvil Kerby</div>
            <span id="theAddr" class="addr-text">0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396</span>
            <button class="btn-copy" onclick="copyMe()">COPIER</button>
        </div>

        <div class="form-box">
            <label>Montant envoyé</label>
            <input type="number" id="amt" placeholder="0.00">
            <div id="calcBox" class="calc-box">Valeur à recevoir : <b id="resVal" style="color:white">0.00 USDT</b></div>

            <label>ID Tranzaksyon / Hash</label>
            <input type="text" id="hash" placeholder="Mete kòd la la">

            <label>Prèv Depo (Screenshot)</label>
            <label for="proof-file" class="file-input-label" id="fileName"><i class="fas fa-camera"></i> Chwazi foto a</label>
            <input type="file" id="proof-file" style="display: none;" accept="image/*" onchange="document.getElementById('fileName').innerText='FOTO AJOUTE'">

            <button class="btn-confirm" onclick="submitDepot()">CONFIRMER LE DÉPÔT</button>
        </div>
    </div>

    <script>
        let currentType = 'USDT';
        let selectedNetName = 'USDT BEP20';
        let currentRawAddr = '0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396';

        document.getElementById('amt').addEventListener('input', updateCalc);

        function changeNet(name, addr, type, el, owner = '') {
            currentType = type;
            selectedNetName = name;
            currentRawAddr = addr;
            document.querySelectorAll('.net-grid .net-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('curNet').innerText = (type === 'HTG' ? "NUMÉRO " : "ADRESSE ") + name;
            document.getElementById('theAddr').innerText = addr;
            document.getElementById('ownerName').style.display = owner ? "block" : "none";
            if(owner) document.getElementById('ownerName').innerText = "NOM: " + owner;
            updateCalc();
        }

        function updateCalc() {
            let val = parseFloat(document.getElementById('amt').value) || 0;
            let display = document.getElementById('resVal');
            if (selectedNetName === 'TRON (TRX)') {
                display.innerHTML = (val * 0.12).toFixed(2) + " USDT";
            } else {
                display.innerHTML = val.toFixed(2) + " " + currentType;
            }
        }

        function copyMe() {
            navigator.clipboard.writeText(currentRawAddr);
            let btn = document.querySelector('.btn-copy');
            btn.innerText = "COPIÉ !";
            setTimeout(() => { btn.innerText = "COPIER"; }, 2000);
        }

        function submitDepot() {
            let h = document.getElementById('hash').value.trim();
            let a = document.getElementById('amt').value;
            
            // Nou rann verifikasyon an pi senp pou l pa bloke w pou granmesi
            if(!a || a <= 0 || h === "") {
                alert("Tanpri mete montan an ak kòd tranzaksyon an!");
                return;
            }

            let valDisplay = document.getElementById('resVal').innerText;
            let history = JSON.parse(localStorage.getItem('transactionHistory')) || [];
            history.unshift({ 
                type: 'Dépôt', 
                amount: valDisplay.split(' ')[0], 
                currency: valDisplay.split(' ')[1],
                network: selectedNetName, 
                date: new Date().toLocaleDateString(), 
                status: 'En attente' 
            });
            localStorage.setItem('transactionHistory', JSON.stringify(history));
            alert("Depo anrejistre!");
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
