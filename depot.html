<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#0b1a2f;color:white;padding:15px}
button{padding:10px;border:none;border-radius:8px;margin-top:10px}
input{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none}
.box{background:#0f2747;padding:15px;border-radius:10px}
.msg{margin-top:10px}
.admin{margin-top:30px;background:#111827;padding:10px;border-radius:10px}
</style>
</head>

<body>

<h3>DÉPÔT</h3>

<div class="box">

<select id="method">
<option value="">Chwazi méthode</option>
<option value="Moncash">Moncash</option>
<option value="Natcash">Natcash</option>
<option value="BEP20">BEP20</option>
<option value="TRC20">TRC20</option>
<option value="TRON">TRON</option>
</select>

<input type="number" id="amount" placeholder="Montan">
<input type="text" id="txid" placeholder="ID tranzaksyon">

<button onclick="submitDepot()">Konfime dépôt</button>

<div id="msg" class="msg"></div>

</div>

<h3>Balance: <span id="balance">0</span> USDT</h3>

<!-- ADMIN PANEL -->
<div class="admin">
<h4>Admin - Valider dépôt</h4>
<div id="list"></div>
</div>

<script>

// INIT USER
let user = JSON.parse(localStorage.getItem("user")) || {id:"u1", balance:0};
let depots = JSON.parse(localStorage.getItem("depots")) || [];

updateUI();

function submitDepot(){
  let method = document.getElementById("method").value;
  let amount = parseFloat(document.getElementById("amount").value);
  let txid = document.getElementById("txid").value.trim();
  let msg = document.getElementById("msg");

  // VALIDATION
  if(!method || !amount || amount<=0 || !txid){
    msg.innerHTML="❌ Ranpli tout enfòmasyon yo";
    msg.style.color="red";
    return;
  }

  // CHECK DUPLICATE TXID
  if(depots.find(d=>d.txid===txid)){
    msg.innerHTML="❌ Txid sa deja itilize";
    msg.style.color="red";
    return;
  }

  let depot={
    id:"dep"+Date.now(),
    userId:user.id,
    montant:amount,
    methode:method,
    txid:txid,
    status:"pending"
  };

  depots.push(depot);
  localStorage.setItem("depots", JSON.stringify(depots));

  msg.innerHTML="⏳ Vérification en cours...";
  msg.style.color="orange";

  updateUI();
}

function valider(id){
  let depot = depots.find(d=>d.id===id);

  if(!depot || depot.status!=="pending") return;

  // KREDITE
  user.balance += depot.montant;
  depot.status="valide";

  localStorage.setItem("user", JSON.stringify(user));
  localStorage.setItem("depots", JSON.stringify(depots));

  alert("✅ Dépôt validé & balance ajouté");
  updateUI();
}

function updateUI(){
  document.getElementById("balance").innerText=user.balance;

  let list="";
  depots.forEach(d=>{
    list+=`
    <div style="border-bottom:1px solid gray;padding:5px">
    ${d.montant}$ - ${d.methode} - ${d.status}
    ${d.status==="pending" ? `<button onclick="valider('${d.id}')">Valider</button>` : "✅"}
    </div>
    `;
  });

  document.getElementById("list").innerHTML=list;
}

</script>

</body>
</html>
