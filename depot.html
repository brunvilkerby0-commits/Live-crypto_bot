                <input type="text" id="f-hash" placeholder="Mete ID tranzaksyon an">
            </div>
        </div>

        <div class="input-group">
            <label>Prèv Depo (Screenshot)</label>
            <input type="file" id="f-file" style="font-size: 12px; padding: 10px; background: #1e293b;">
        </div>

<script>
    // Done pou chak metòd depo
    const depoData = {
        bep20: { label: "ADRÈS USDT BEP20", addr: "0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396" },
        trc20: { label: "ADRÈS USDT TRC20", addr: "TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy" },
        trx: { label: "ADRÈS TRON (TRX)", addr: "TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy" },
        moncash: { label: "NIMEWO MONCASH NOU", addr: "31800614" },
        natcash: { label: "NIMEWO NATCASH NOU", addr: "32695844" }
    };

    // Fonksyon pou chanje metòd
    function switchDepo(id) {
        document.querySelectorAll('.m-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('m-' + id).classList.add('active');
        document.getElementById('depo-label').innerText = depoData[id].label;
        document.getElementById('depo-addr').innerText = depoData[id].addr;
        document.getElementById('status-msg').style.display = 'none';
    }

    // Fonksyon pou kopye tèks
    function copyText() {
        const text = document.getElementById('depo-addr').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Enfòmasyon kopye!");
        });
    }

    // Fonksyon validation final
    function valideDepo() {
        const amount = document.getElementById('f-amount').value;
        const hash = document.getElementById('f-hash').value;
        const file = document.getElementById('f-file').files.length;
        const status = document.getElementById('status-msg');

        if (!amount || !hash || file === 0) {
            alert("ERÈ: Ranpli tout bwat yo epi mete foto prèv la!");
        } else {
            status.innerText = "✅ Depo " + amount + " voye bay admin! Tann verifikasyon an.";
            status.style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // Isit la ou ka ajoute lojik pou voye done yo nan Telegram bot ou a
        }
    }
</script>
