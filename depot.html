<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Live Crypto Bot - Dépôt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        .header { padding: 20px; display: flex; align-items: center; background: var(--card-dark); border-bottom: 1px solid rgba(212, 175, 55, 0.2); position: sticky; top: 0; z-index: 1000; }
        .header a { color: var(--gold); text-decoration: none; margin-right: 20px; font-size: 20px; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* REZO YO */
        .net-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .net-card { 
            background: var(--card-dark); border: 1px solid rgba(212, 175, 55, 0.1); 
            padding: 15px 5px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .net-card.active { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.1); }
        .net-card i { font-size: 20px; color: var(--gold); margin-bottom: 8px; display: block; }
        .net-card span { font-size: 10px; font-weight: bold; display: block; }

        /* AFFICHAGE ADRESSE */
        .addr-display { background: #000; border: 1px dashed var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 25px; text-align: center; }
        .addr-text { font-size: 12px; color: #fff; word-break: break-all; font-family: 'Courier New', monospace; display: block; margin: 10px 0; }
        .btn-copy { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; }

        /* FORMULAIRE */
        .form-box { background: var(--card-dark); padding: 20px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.1); }
        label { font-size: 11px; color: var(--gold); font-weight: bold; display: block; margin-bottom: 8px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 15px; background: #0a192f; border: 1px solid rgba(212, 175, 55, 0.2); 
            color: white; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px;
        }
        
        .calc-box { font-size: 13px; color: #8892b0; margin-bottom: 20px; text-align: right; font-weight: bold; }
        .calc-box b { color: white; }

        .btn-confirm { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; }
        
        .warning { font-size: 11px; color: #ff4d4d; margin-top: 15px; text-align: center; opacity: 0.8; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html"><i class="fas fa-arrow-left"></i></a>
        <div style="font-weight: 800; letter-spacing: 1px;">DÉPÔT DE FONDS</div>
    </div>

    <div class="container">
        <label>1. Sélectionnez le réseau</label>
        <div class="net-grid">
            <div class="net-card active" onclick="changeNet('USDT BEP20', '0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396', this)">
                <i class="fas fa-coins"></i><span>BEP20</span>
            </div>
            <div class="net-card" onclick="changeNet('USDT TRC20', 'TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy', this)">
                <i class="fas fa-bolt"></i><span>TRC20</span>
            </div>
            <div class="net-card" onclick="changeNet('TRON (TRX)', 'TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy', this)">
                <i class="fas fa-gem"></i><span>TRON</span>
            </div>
        </div>

        <div class="addr-display">
            <div id="curNet" style="font-size: 10px; color: var(--gold); font-weight: 800; letter-spacing: 1px;">ADRESSE USDT BEP20</div>
            <span id="theAddr" class="addr-text">0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396</span>
            <button class="btn-copy" onclick="copyMe()">COPIER L'ADRESSE</button>
        </div>

        <div class="form-box">
            <label>Montant envoyé</label>
            <input type="number" id="amt" placeholder="0.00" oninput="updateCalc()">
            
            <div id="calcBox" class="calc-box">Valeur créditée: <b id="resVal">$0.00 USDT</b></div>

            <label>ID de transaction (TXID / HASH)</label>
            <input type="text" id="hash" placeholder="Collez le code de transaction">

            <button class="btn-confirm" onclick="submitDepot()">CONFIRMER LE DÉPÔT</button>
        </div>

        <div class="warning">
            <i class="fas fa-exclamation-triangle"></i><br>
            Envoyez uniquement le montant spécifié sur le réseau choisi.<br>
            Le crédit sera ajouté à votre compte après vérification manuelle.
        </div>
    </div>

    <script>
        let selectedNet = 'USDT BEP20';

        function changeNet(name, addr, el) {
            selectedNet = name;
            document.querySelectorAll('.net-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('curNet').innerText = "ADRESSE " + name;
            document.getElementById('theAddr').innerText = addr;
            updateCalc();
        }

        function updateCalc() {
            let val = document.getElementById('amt').value || 0;
            let display = document.getElementById('resVal');
            
            if(selectedNet === 'TRON (TRX)') {
                // Kalkilatris TRON (egzanp 1 TRX = 0.12 USDT)
                let final = (val * 0.12).toFixed(2);
                display.innerHTML = "$" + final + " USDT";
            } else {
                display.innerHTML = "$" + parseFloat(val).toFixed(2) + " USDT";
            }
        }

        function copyMe() {
            let addr = document.getElementById('theAddr').innerText;
            navigator.clipboard.writeText(addr).then(() => {
                alert("Adresse copiée !");
            });
        }

        function submitDepot() {
            let h = document.getElementById('hash').value;
            let a = document.getElementById('amt').value;
            let finalAmount = document.getElementById('resVal').innerText.replace('$', '').replace(' USDT', '');
            
            if(!h || !a) {
                alert("Veuillez remplir le montant et le TXID.");
                return;
            }

            // SOVE TRANZAKSYON AN POU L KA PARÈT SOU DASHBOARD
            const newTransaction = {
                type: 'Dépôt',
                amount: finalAmount,
                network: selectedNet,
                date: new Date().toLocaleDateString(),
                status: 'En attente'
            };

            let history = JSON.parse(localStorage.getItem('transactionHistory')) || [];
            history.unshift(newTransaction);
            localStorage.setItem('transactionHistory', JSON.stringify(history));

            alert("Dépôt enregistré ! Votre solde sera mis à jour dès confirmation.");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
