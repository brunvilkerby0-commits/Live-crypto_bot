<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<div class="main-wrapper" style="width: 100%; min-height: 100vh; background: #0b1120; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    
    <div id="deposit-section" style="background: #0f172a; color: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        
        <div id="status-msg" style="display: none; background: #064e3b; color: #34d399; padding: 12px; border-radius: 10px; text-align: center; font-size: 13px; font-weight: bold; margin-bottom: 15px; border: 1px solid #059669;">
            ✅ Depo voye! Tann admin valide l.
        </div>

        <h3 style="text-align: center; color: #fbbf24; margin-bottom: 20px; text-transform: uppercase; font-size: 16px; letter-spacing: 1px;">Seleksyone Metòd la</h3>

        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
            <div onclick="switchDepo('bep20')" id="m-bep20" class="m-btn active">
                <img src="https://cryptologos.cc/logos/binance-usd-busd-logo.png" width="22"><br>BEP20
            </div>
            <div onclick="switchDepo('trc20')" id="m-trc20" class="m-btn">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" width="22"><br>TRC20
            </div>
            <div onclick="switchDepo('trx')" id="m-trx" class="m-btn">
                <img src="https://cryptologos.cc/logos/tron-trx-logo.png" width="22"><br>TRON
            </div>
            <div onclick="switchDepo('moncash')" id="m-moncash" class="m-btn">
                <img src="https://i.postimg.cc/mD4m90Ym/moncash.png" width="22" style="border-radius:4px;"><br>MonCash
            </div>
            <div onclick="switchDepo('natcash')" id="m-natcash" class="m-btn">
                <img src="https://i.postimg.cc/8P6mP1y9/natcash.png" width="22" style="border-radius:4px;"><br>Natcash
            </div>
        </div>

        <div style="background: #000; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px dashed #fbbf24; text-align: center;">
            <p id="depo-label" style="font-size: 10px; color: #fbbf24; margin: 0 0 5px 0; font-weight: bold; text-transform: uppercase;">Adresse USDT BEP20</p>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                <strong id="depo-addr" style="font-size: 13px; color: #fff; word-break: break-all; font-family: monospace;">0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396</strong>
                <button onclick="copyAddr()" style="background: #fbbf24; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; color: #000; font-size: 12px;">KOPYE ENFÒMASYON YO</button>
            </div>
        </div>

        <p id="time-note" style="text-align: center; font-size: 10px; color: #94a3b8; margin-bottom: 20px;">
            <span style="color: #fbbf24;">●</span> Verifikasyon: 2 a 3 minit
        </p>

        <div style="margin-bottom: 12px;">
            <label style="font-size: 11px; color: #94a3b8; display: block; margin-bottom: 4px;">MONTAN OU VOYE A</label>
            <input type="number" id="finalAmt" placeholder="0.00" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; font-size: 16px;">
        </div>
        
        <div style="margin-bottom: 12px;">
            <label style="font-size: 11px; color: #94a3b8; display: block; margin-bottom: 4px;">ID TRANZAKSYON / NIP</label>
            <input type="text" id="finalHash" placeholder="Tape ID a la" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; font-size: 16px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="font-size: 11px; color: #94a3b8; display: block; margin-bottom: 4px;">PRÈV DEPO (SCREENSHOT)</label>
            <input type="file" id="finalImg" style="font-size: 12px; color: #94a3b8; width: 100%; background: #1e293b; padding: 10px; border-radius: 10px; border: 1px solid #334155;">
        </div>

        <button onclick="valideDepo()" style="width: 100%; padding: 15px; background: #fbbf24; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; text-transform: uppercase;">Konfime Depo a</button>

    </div>
</div>

<style>
    .m-btn { background: #1e293b; padding: 10px 5px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; font-size: 9px; color: #94a3b8; font-weight: bold; transition: 0.2s; }
    .active { border-color: #fbbf24; background: #1e293b; color: white; box-shadow: 0 0 10px rgba(251, 191, 36, 0.15); }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    input { -webkit-user-select: auto; user-select: auto; }
</style>

<script>
    const dData = {
        bep20: { label: "Adresse USDT BEP20", val: "0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396", time: "2 a 3 minit" },
        trc20: { label: "Adresse USDT TRC20", val: "TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy", time: "2 a 3 minit" },
        trx: { label: "Adresse TRON (TRX)", val: "TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy", time: "2 a 3 minit" },
        moncash: { label: "Nimewo MonCash nou", val: "31800614", time: "10 minit" },
        natcash: { label: "Nimewo Natcash nou", val: "32695844", time: "10 minit" }
    };

    function switchDepo(id) {
        document.getElementById('status-msg').style.display = 'none';
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-'+id).classList.add('active');
        document.getElementById('depo-label').innerText = dData[id].label;
        document.getElementById('depo-addr').innerText = dData[id].val;
        document.getElementById('time-note').innerHTML = `<span style="color: #fbbf24;">●</span> Verifikasyon: ${dData[id].time}`;
    }

    function copyAddr() {
        let t = document.getElementById('depo-addr').innerText;
        navigator.clipboard.writeText(t).then(() => {
            alert("Kopye!");
        });
    }

    function valideDepo() {
        let valAmt = document.getElementById('finalAmt').value;
        let valHash = document.getElementById('finalHash').value;
        let valImg = document.getElementById('finalImg').files.length;
        let msg = document.getElementById('status-msg');

        if (valAmt.trim() === "" || valHash.trim() === "" || valImg === 0) {
            alert("ERÈ: Ranpli tout bwat yo epi mete foto prèv la!");
        } else {
            msg.innerText = "✅ Depo voye! Tann " + dData[document.querySelector('.active').id.split('-')[1]].time + " pou verifikasyon.";
            msg.style.display = 'block';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    }
</script>
