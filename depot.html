<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Live Crypto Bot - Dépôt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; --green: #2ecc71; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .header { padding: 20px; display: flex; align-items: center; background: var(--card-dark); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .header a { color: var(--gold); text-decoration: none; margin-right: 20px; font-size: 20px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* Style pou Opsyon Rapid Trust Wallet */
        .fast-pay { background: rgba(46, 204, 113, 0.1); border: 1px dashed var(--green); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .btn-fast { background: var(--green); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }

        /* Style pou Opsyon Manyèl */
        .net-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .net-card { background: var(--card-dark); border: 1px solid rgba(212, 175, 55, 0.1); padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; }
        .net-card.active { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        .addr-box { background: #0a192f; padding: 15px; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.3); display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .addr-text { font-size: 13px; color: var(--gold); word-break: break-all; }
        
        .form-box { background: var(--card-dark); padding: 20px; border-radius: 20px; }
        input { width: 100%; padding: 15px; background: #0a192f; border: 1px solid rgba(212, 175, 55, 0.2); color: white; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-submit { background: var(--gold); color: black; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <a href="dashboard.html"><i class="fas fa-arrow-left"></i></a>
    <div style="font-weight: 800; color: var(--gold);">DÉPOSER DES FONDS</div>
</div>

<div class="container">
    <div class="fast-pay">
        <div style="color: var(--green); font-weight: bold; font-size: 14px;">MÈTÒD RAPID (TRUST WALLET)</div>
        <p style="font-size: 11px; color: #8892b0;">Si w gen Trust Wallet, peye an 1 klike.</p>
        <button class="btn-fast" onclick="payWithTrust()">
            <i class="fas fa-bolt"></i> PAYER AVEC TRUST WALLET
        </button>
    </div>

    <div style="text-align: center; margin-bottom: 20px; font-size: 12px; color: var(--gold);">— OUBYEN PAYE MANYÈLMAN —</div>

    <div class="form-box">
        <label style="font-size: 11px; color: var(--gold);">CHWAZI METÒD OU A</label>
        <div class="net-grid" style="margin-top: 10px;">
            <div class="net-card active" onclick="setMethod('MonCash', '44xx-xxxx', this)">
                <i class="fas fa-mobile-alt"></i><br><span style="font-size: 10px;">MonCash</span>
            </div>
            <div class="net-card" onclick="setMethod('Natcash', '40xx-xxxx', this)">
                <i class="fas fa-phone-alt"></i><br><span style="font-size: 10px;">Natcash</span>
            </div>
            <div class="net-card" onclick="setMethod('USDT', '0x7fD50...11396', this)">
                <i class="fas fa-wallet"></i><br><span style="font-size: 10px;">USDT</span>
            </div>
        </div>

        <div class="addr-box">
            <span id="theAddr" class="addr-text">44xx-xxxx</span>
            <i class="fas fa-copy" style="color: var(--gold); cursor: pointer;" onclick="copyAddr()"></i>
        </div>

        <input type="number" id="depotAmt" placeholder="Montan">
        <input type="text" id="transID" placeholder="ID Tranzaksyon (Nip oswa Hash)">
        
        <p style="font-size: 10px; color: #8892b0; margin-bottom: 5px;">Voye screenshot peman an (Obligatwa pou manyèl)</p>
        <input type="file" id="screenshot" accept="image/*">

        <button class="btn-submit" onclick="submitManual()">CONFIRMER LE DÉPÔT</button>
    </div>
</div>

<script>
    let currentAddr = "44xx-xxxx";

    function setMethod(method, addr, el) {
        currentAddr = addr;
        document.querySelectorAll('.net-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('theAddr').innerText = addr;
    }

    function copyAddr() {
        navigator.clipboard.writeText(currentAddr);
        alert("Adrès kopye!");
    }

    function payWithTrust() {
        // Lojik pou detekte si moun nan sou Chrome epi voye l nan Trust Wallet
        alert("Sistèm nan ap konekte ak Trust Wallet ou...");
        // Isit la nou pral mete kòd WalletConnect la pita
    }

    function submitManual() {
        let amt = document.getElementById('depotAmt').value;
        let id = document.getElementById('transID').value;
        
        if(!amt || !id) {
            alert("Tanpri ranpli montan an ak ID tranzaksyon an!");
            return;
        }
        alert("Depo w la anrejistre! Admin ap verifye sa.");
        window.location.href = "dashboard.html";
    }
</script>

</body>
</html>
