<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Live Crypto Bot - Dépôt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .header { padding: 20px; display: flex; align-items: center; background: var(--card-dark); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .header a { color: var(--gold); text-decoration: none; margin-right: 20px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .net-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(65px, 1fr)); gap: 5px; margin-bottom: 20px; }
        .net-card { background: var(--card-dark); border: 1px solid rgba(212, 175, 55, 0.1); padding: 8px 1px; border-radius: 10px; text-align: center; cursor: pointer; }
        .net-card.active { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.1); }
        .addr-display { background: #000; border: 1px dashed var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .addr-text { font-size: 13px; color: #fff; word-break: break-all; display: block; margin: 10px 0; font-weight: bold; }
        .btn-copy { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .form-box { background: var(--card-dark); padding: 20px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.1); }
        label { font-size: 11px; color: var(--gold); font-weight: bold; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 15px; background: #0a192f; border: 1px solid rgba(212, 175, 55, 0.2); color: white; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .file-input-label { display: block; width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(212, 175, 55, 0.5); border-radius: 10px; text-align: center; cursor: pointer; margin-bottom: 20px; color: var(--gold); }
        .btn-confirm { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="dashboard.html"><i class="fas fa-arrow-left"></i></a>
        <div style="font-weight: 800; color: var(--gold);">DÉPÔT DE FONDS</div>
    </div>

    <div class="container">
        <div class="net-grid">
            <div class="net-card active" onclick="changeNet('BEP20', '0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396', 'USDT', this)">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png?v=025" width="20"><span>BEP20</span>
            </div>
            <div class="net-card" onclick="changeNet('TRC20', 'TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy', 'USDT', this)">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png?v=025" width="20"><span>TRC20</span>
            </div>
            <div class="net-card" onclick="changeNet('TRON', 'TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy', 'TRX', this)">
                <img src="https://cryptologos.cc/logos/tron-trx-logo.png?v=025" width="20"><span>TRON</span>
            </div>
            <div class="net-card" onclick="changeNet('MonCash', '31800614', 'HTG', this, 'Brunvil Kerby')">
                <span>MonCash</span>
            </div>
            <div class="net-card" onclick="changeNet('Natcash', '32696844', 'HTG', this, 'Brunvil Kerby')">
                <span>Natcash</span>
            </div>
        </div>

        <div class="addr-display">
            <div id="curNet" style="font-size: 10px; color: var(--gold);">ADRESSE USDT BEP20</div>
            <span id="theAddr" class="addr-text">0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396</span>
            <button class="btn-copy" onclick="copyMe()">COPIER</button>
        </div>

        <div class="form-box">
            <label>Montant envoyé</label>
            <input type="number" id="amt" placeholder="Antre montan an">

            <label>ID Tranzaksyon / Hash</label>
            <input type="text" id="hash" placeholder="Mete kòd la la">

            <label>Prèv (Screenshot)</label>
            <label for="proof-file" class="file-input-label" id="fileName">CHWAZI FOTO A</label>
            <input type="file" id="proof-file" style="display: none;" onchange="updateFileStatus()">

            <button class="btn-confirm" onclick="submitDepot()">CONFIRMER LE DÉPÔT</button>
        </div>
    </div>

    <script>
        let currentType = 'USDT';
        let selectedNet = 'BEP20';
        let hasFile = false;

        function updateFileStatus() {
            if(document.getElementById('proof-file').files.length > 0) {
                hasFile = true;
                document.getElementById('fileName').innerText = "FOTO AJOUTE ✅";
                document.getElementById('fileName').style.color = "#00ff00";
            }
        }

        function changeNet(name, addr, type, el) {
            selectedNet = name;
            currentType = type;
            document.querySelectorAll('.net-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('curNet').innerText = "ADRESSE " + name;
            document.getElementById('theAddr').innerText = addr;
        }

        function copyMe() {
            navigator.clipboard.writeText(document.getElementById('theAddr').innerText);
            alert("Copied!");
        }

        function submitDepot() {
            let amount = document.getElementById('amt').value;
            let hash = document.getElementById('hash').value.trim();

            // VERIFIKASYON KI P AP KITE ANYEN PASE SI L VID
            if(!amount || amount <= 0) {
                alert("Erreur: Mete montan kòb ou voye a!");
                return;
            }
            if(hash === "" || hash.length < 4) {
                alert("Erreur: Mete yon ID tranzaksyon ki valab!");
                return;
            }
            if(!hasFile) {
                alert("Erreur: Ou dwe ajoute foto prèv la!");
                return;
            }

            // Si tout bagay bon, se lè sa a l ap sove
            let history = JSON.parse(localStorage.getItem('transactionHistory')) || [];
            history.unshift({
                type: 'Dépôt',
                amount: amount,
                currency: (selectedNet === 'MonCash' || selectedNet === 'Natcash') ? 'HTG' : 'USDT',
                status: 'En attente',
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('transactionHistory', JSON.stringify(history));
            
            alert("Depo anrejistre! Tanpri tann verifikasyon an.");
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
