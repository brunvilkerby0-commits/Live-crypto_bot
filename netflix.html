<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<div class="main-wrapper" style="width: 100%; min-height: 100vh; background: #0b1120; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; font-family: sans-serif;">
    
    <div id="deposit-section" style="background: #0f172a; color: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        
        <div id="status-msg" style="display: none; background: #064e3b; color: #34d399; padding: 12px; border-radius: 10px; text-align: center; font-size: 13px; font-weight: bold; margin-bottom: 15px; border: 1px solid #059669;">
            ✅ Demann voye! Tann admin aktive Netflix ou a.
        </div>

        <div style="text-align: center; margin-bottom: 20px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" width="120" style="margin-bottom: 10px;">
            <h3 style="color: #fbbf24; text-transform: uppercase; font-size: 16px; margin: 0;">Plan 1 Mwa - 12.00$</h3>
        </div>

        <h3 style="text-align: center; color: #fff; margin-bottom: 15px; font-size: 14px; letter-spacing: 1px;">SELEKSYONE METÒD PEMAN</h3>

        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
            <div onclick="switchPay('moncash')" id="m-moncash" class="m-btn active">
                <img src="https://i.postimg.cc/mD4m90Ym/moncash.png" width="22" style="border-radius:4px;"><br>MonCash
            </div>
            <div onclick="switchPay('natcash')" id="m-natcash" class="m-btn">
                <img src="https://i.postimg.cc/8P6mP1y9/natcash.png" width="22" style="border-radius:4px;"><br>Natcash
            </div>
            <div onclick="switchPay('usdt')" id="m-usdt" class="m-btn">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" width="22"><br>USDT
            </div>
        </div>

        <div style="background: #000; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #e50914; text-align: center;">
            <p id="pay-label" style="font-size: 10px; color: #fbbf24; margin: 0 0 5px 0; font-weight: bold; text-transform: uppercase;">Nimewo MonCash nou</p>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                <strong id="pay-addr" style="font-size: 14px; color: #fff; word-break: break-all; font-family: monospace;">31800614</strong>
                <button onclick="copyAddr()" style="background: #e50914; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; color: #fff; font-size: 12px;">KOPYE ENFÒMASYON</button>
            </div>
        </div>

        <div style="margin-bottom: 12px;">
            <label style="font-size: 11px; color: #94a3b8; display: block; margin-bottom: 4px;">EMAIL POU NETFLIX LA</label>
            <input type="email" id="userEmail" placeholder="egzamp@gmail.com" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; font-size: 15px;">
        </div>
        
        <div style="margin-bottom: 12px;">
            <label style="font-size: 11px; color: #94a3b8; display: block; margin-bottom: 4px;">ID TRANZAKSYON / NIP</label>
            <input type="text" id="payHash" placeholder="ID peman an" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; font-size: 15px;">
        </div>

        <button onclick="valideNetflix()" style="width: 100%; padding: 15px; background: #e50914; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; text-transform: uppercase; margin-top: 10px;">ACHTE KOUNYE A</button>

    </div>
</div>

<style>
    .m-btn { background: #1e293b; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; font-size: 9px; color: #94a3b8; font-weight: bold; transition: 0.2s; }
    .active { border-color: #e50914; background: #1e293b; color: white; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
</style>

<script>
    const pData = {
        moncash: { label: "Nimewo MonCash nou", val: "31800614" },
        natcash: { label: "Nimewo Natcash nou", val: "32695844" },
        usdt: { label: "Adrès USDT (BEP20)", val: "0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396" }
    };

    function switchPay(id) {
        document.getElementById('status-msg').style.display = 'none';
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-'+id).classList.add('active');
        document.getElementById('pay-label').innerText = pData[id].label;
        document.getElementById('pay-addr').innerText = pData[id].val;
    }

    function copyAddr() {
        let t = document.getElementById('pay-addr').innerText;
        navigator.clipboard.writeText(t).then(() => { alert("Kopye!"); });
    }

    function valideNetflix() {
        let email = document.getElementById('userEmail').value;
        let hash = document.getElementById('payHash').value;
        let msg = document.getElementById('status-msg');

        if (email.trim() === "" || hash.trim() === "") {
            alert("ERÈ: Tanpri mete email ou ak ID peman an!");
        } else {
            msg.style.display = 'block';
            window.scrollTo({top: 0, behavior: 'smooth'});
            alert("SIKSÈ: Demann pou plan 12$ la voye bay admin!");
        }
    }
</script>
