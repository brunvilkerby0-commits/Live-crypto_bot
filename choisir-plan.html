<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander une Carte - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-bg: #112240; --white: #ffffff; }
        body { background: var(--navy); color: var(--white); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .main-container { width: 100%; max-width: 450px; text-align: center; }
        h2 { color: var(--gold); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; font-size: 18px; }

        /* VIZYÈL KAT YO */
        .plans-wrapper { display: flex; flex-direction: column; gap: 20px; }
        
        .visual-card {
            width: 100%; height: 180px; border-radius: 15px; position: relative;
            padding: 20px; box-sizing: border-box; cursor: pointer;
            transition: 0.4s; display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
        }
        .visual-card:hover { transform: scale(1.02); }

        .card-standard { background: linear-gradient(135deg, #2c3e50, #000000); border: 1px solid #aaa; }
        .card-premium { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); color: #000; }
        .card-vip { background: linear-gradient(135deg, #000000, #1a1a1a); border: 1px solid var(--gold); }

        .chip { width: 35px; height: 25px; background: rgba(255,255,255,0.2); border-radius: 4px; }
        .card-premium .chip { background: rgba(0,0,0,0.2); }
        
        .plan-name { font-size: 20px; font-weight: 800; text-align: left; }
        .price-tag { font-size: 22px; font-weight: 900; align-self: flex-end; }

        /* SEKSYON KYC (KACHE) */
        #kyc-section { display: none; background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: left; border-top: 4px solid var(--gold); margin-top: 15px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: var(--gold); margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #0a192f; color: white; box-sizing: border-box; outline: none; }
        
        .file-box { border: 2px dashed rgba(212, 175, 55, 0.4); padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; margin-top: 5px; }
        .file-box i { font-size: 20px; color: var(--gold); }
        
        .btn-pay { background: var(--gold); color: var(--navy); border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: 900; margin-top: 20px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 id="page-title">Choisissez le style de votre carte</h2>

    <div id="plans-section" class="plans-wrapper">
        <div class="visual-card card-standard" onclick="showKYC('Standard Blue', 15)">
            <div class="chip"></div>
            <div class="plan-name">STANDARD</div>
            <div class="price-tag">15 USDT</div>
        </div>

        <div class="visual-card card-premium" onclick="showKYC('Premium Gold', 19)">
            <div class="chip"></div>
            <div class="plan-name">PREMIUM GOLD</div>
            <div class="price-tag">19 USDT</div>
        </div>

        <div class="visual-card card-vip" onclick="showKYC('VIP Black Luxury', 20)">
            <div class="chip" style="background: var(--gold);"></div>
            <div class="plan-name" style="color: var(--gold);">VIP LUXURY</div>
            <div class="price-tag" style="color: var(--gold);">20 USDT</div>
        </div>
    </div>

    <div id="kyc-section">
        <p style="font-size: 12px; color: #888;">Plan: <span id="selected-plan-text" style="color: var(--gold);"></span></p>
        
        <form id="cardForm">
            <div class="input-group"><label>Nom complet</label><input type="text" id="fullname" placeholder="Nom sur votre ID" required></div>
            <div class="input-group"><label>Email</label><input type="email" id="email" placeholder="votre@email.com" required></div>
            <div class="input-group"><label>Téléphone</label><input type="text" id="phone" placeholder="+509..." required></div>
            <div class="input-group">
                <label>Pays</label>
                <select id="country">
                    <option value="HT">Haïti</option>
                    <option value="US">USA</option>
                    <option value="DR">Rép. Dominicaine</option>
                    <option value="FR">France</option>
                    <option value="CA">Canada</option>
                </select>
            </div>
            
            <label>Vérification ID (Recto)</label>
            <div class="file-box" onclick="document.getElementById('id_file').click()">
                <i class="fas fa-camera"></i><br>
                <span id="file-name" style="font-size: 11px;">Cliquez pour ajouter l'ID</span>
                <input type="file" id="id_file" hidden accept="image/*" onchange="document.getElementById('file-name').innerText = this.files[0].name">
            </div>

            <button type="button" class="btn-pay" onclick="finish()">Continuer vers le paiement</button>
        </form>
    </div>
</div>

<script>
    let finalPrice = 0;

    function showKYC(name, price) {
        finalPrice = price;
        document.getElementById('plans-section').style.display = 'none';
        document.getElementById('page-title').innerText = 'Informations de la carte';
        document.getElementById('kyc-section').style.display = 'block';
        document.getElementById('selected-plan-text').innerText = name;
    }

    function finish() {
        const email = document.getElementById('email').value;
        if(!email) { alert("Remplissez le formulaire svp"); return; }
        
        localStorage.setItem('userEmail', email);
        localStorage.setItem('pendingPrice', finalPrice);
        window.location.href = '../paiement.html'; // Remonte d'un dossier
    }
</script>

</body>
</html>
