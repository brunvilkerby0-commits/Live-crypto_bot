<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Crypto Bot - Premium Cards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #060e1b; --card-bg: #112240; --white: #ffffff; }
        body { background: var(--navy); color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; }
        
        .container { max-width: 500px; margin: 0 auto; }

        /* --- DESIGN KAT KI SANBLE KAT REYÈL --- */
        .header-title { color: var(--gold); text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 30px; text-transform: uppercase; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        .visa-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 15px; padding: 25px; margin-bottom: 25px;
            cursor: pointer; position: relative; height: 180px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .visa-card:active { transform: scale(0.95); border-color: var(--gold); }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .chip { width: 45px; height: 35px; background: linear-gradient(135deg, #e0c068, #b08d32); border-radius: 5px; }
        .visa-logo { font-size: 28px; font-weight: 900; font-style: italic; color: white; }
        
        .card-middle { font-size: 18px; letter-spacing: 2px; opacity: 0.8; margin-top: 20px; }
        .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
        .plan-name { font-weight: bold; color: var(--gold); font-size: 14px; text-transform: uppercase; }
        .plan-price { font-size: 30px; font-weight: 900; color: white; }

        /* --- FÒMILÈ KI PLI GWO --- */
        #form-screen { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .big-header { 
            background: var(--gold); color: #000; 
            padding: 25px; border-radius: 15px; text-align: center; 
            margin-bottom: 30px; 
        }
        .big-header h3 { margin: 0; font-size: 16px; opacity: 0.8; }
        .big-header .price { font-size: 45px; font-weight: 900; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: var(--gold); font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .input-group input { 
            width: 100%; background: #112240; border: 2px solid rgba(212, 175, 55, 0.3); 
            padding: 18px; border-radius: 12px; color: white; box-sizing: border-box; 
            font-size: 18px; /* Pi gwo ekriti */
            outline: none;
        }

        .kyc-section-title { color: var(--gold); font-weight: bold; margin: 30px 0 15px; font-size: 18px; text-align: center; }
        .kyc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .kyc-box { 
            background: rgba(255,255,255,0.05); border: 2px dashed var(--gold); 
            padding: 20px; border-radius: 15px; text-align: center; cursor: pointer;
        }
        .kyc-box i { font-size: 30px; color: var(--gold); margin-bottom: 10px; }

        .btn-submit { 
            width: 100%; background: var(--gold); color: #000; border: none; 
            padding: 22px; border-radius: 15px; font-size: 20px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; margin-top: 25px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="selection-screen">
        <h2 class="header-title">Chwazi Kat Ou</h2>
        
        <div class="visa-card" onclick="showForm('STANDARD', 15)">
            <div class="card-top">
                <div class="chip"></div>
                <div class="visa-logo">VISA</div>
            </div>
            <div class="card-middle">**** **** **** 4012</div>
            <div class="card-bottom">
                <div class="plan-name">STANDARD</div>
                <div class="plan-price">15 USDT</div>
            </div>
        </div>

        <div class="visa-card" onclick="showForm('PREMIUM GOLD', 19)" style="border: 2px solid var(--gold);">
            <div class="card-top">
                <div class="chip"></div>
                <div class="visa-logo" style="color: var(--gold);">VISA</div>
            </div>
            <div class="card-middle">**** **** **** 8890</div>
            <div class="card-bottom">
                <div class="plan-name">PREMIUM GOLD</div>
                <div class="plan-price" style="color: var(--gold);">19 USDT</div>
            </div>
        </div>

        <div class="visa-card" onclick="showForm('VIP LUXURY', 20)" style="background: #000; border: 2px solid #fff;">
            <div class="card-top">
                <div class="chip" style="background: #eee;"></div>
                <div class="visa-logo">VISA</div>
            </div>
            <div class="card-middle">**** **** **** 0001</div>
            <div class="card-bottom">
                <div class="plan-name" style="color: #fff;">VIP LUXURY</div>
                <div class="plan-price">20 USDT</div>
            </div>
        </div>
    </div>

    <div id="form-screen">
        <div class="big-header">
            <h3 id="plan-name-label">MODÈL CHWAZI A</h3>
            <div class="price"><span id="price-tag">0</span> USDT</div>
        </div>

        <div class="input-group">
            <label>NOM COMPLET</label>
            <input type="text" placeholder="Ex: Jean Dupont">
        </div>
        
        <div class="input-group">
            <label>EMAIL</label>
            <input type="email" placeholder="votre@email.com">
        </div>

        <div class="input-group">
            <label>TÉLÉPHONE (WHATSAPP)</label>
            <input type="tel" placeholder="+509 0000-0000">
        </div>

        <div class="kyc-section-title">VÉRIFICATION D'IDENTITÉ</div>
        <div class="kyc-grid">
            <div class="kyc-box" onclick="alert('Kamera louvri')">
                <i class="fas fa-camera"></i><br><span>DEVAN ID</span>
            </div>
            <div class="kyc-box" onclick="alert('Kamera louvri')">
                <i class="fas fa-camera"></i><br><span>DÈYÈ ID</span>
            </div>
        </div>

        <button class="btn-submit" onclick="alert('Traitement...')">
            KONFIME & PEYE
        </button>

        <p onclick="location.reload()" style="text-align:center; font-size:14px; margin-top:30px; cursor:pointer; opacity:0.6;">
            ← Tounen nan chwa kat
        </p>
    </div>

</div>

<script>
    function showForm(name, price) {
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('form-screen').style.display = 'block';
        document.getElementById('plan-name-label').innerText = name;
        document.getElementById('price-tag').innerText = price;
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
