<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chwazi Modèl Kat - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-bg: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        
        .container { max-width: 450px; margin: 0 auto; }
        h2 { color: var(--gold); text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }

        /* DESIGN KAT YO */
        .plan-list { display: flex; flex-direction: column; gap: 20px; }
        
        .plan-card {
            background: linear-gradient(135deg, var(--card-bg) 0%, #1d2d44 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 25px;
            text-decoration: none;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .plan-card:active { transform: scale(0.96); border-color: var(--gold); }
        
        /* Efè Luxury pou kat Gold ak VIP */
        .gold-border { border: 2px solid var(--gold); background: linear-gradient(135deg, #112240 0%, #1a1a1a 100%); }
        .gold-text { color: var(--gold); font-weight: 800; font-size: 18px; }

        .plan-info { text-align: left; }
        .plan-name { font-size: 18px; font-weight: bold; display: block; margin-bottom: 5px; }
        .plan-price { font-size: 22px; font-weight: 900; color: var(--gold); }
        
        .arrow { font-size: 20px; opacity: 0.5; }

        .footer-note { margin-top: 40px; font-size: 11px; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <h2>CHWAZI MODÈL KAT OU</h2>

    <div class="plan-list">
        
        <a href="kyc.html?price=15" class="plan-card">
            <div class="plan-info">
                <span class="plan-name">STANDARD</span>
                <span class="plan-price">15 USDT</span>
            </div>
            <div class="arrow"><i class="fas fa-chevron-right"></i></div>
        </a>

        <a href="kyc.html?price=19" class="plan-card gold-border">
            <div class="plan-info">
                <span class="plan-name gold-text">PREMIUM GOLD</span>
                <span class="plan-price">19 USDT</span>
            </div>
            <div class="arrow" style="color: var(--gold); opacity: 1;"><i class="fas fa-crown"></i></div>
        </a>

        <a href="kyc.html?price=20" class="plan-card gold-border" style="background: #000;">
            <div class="plan-info">
                <span class="plan-name gold-text">VIP LUXURY</span>
                <span class="plan-price">20 USDT</span>
            </div>
            <div class="arrow" style="color: var(--gold); opacity: 1;"><i class="fas fa-gem"></i></div>
        </a>

    </div>

    <p class="footer-note">Tout kat nou yo mache entènasyonalman pou tout kalite acha sou entènèt.</p>
</div>

</body>
</html>
